<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bible Verse Selector – Navy</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Sans+Tamil:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }

:root {
  --bg:        #2a2a2a;
  --bg-deep:   #222222;
  --bg-card:   #333333;
  --bg-item:   #2f2f2f;
  --border:    #3a3a3a;
  --blue:      #4a9060;
  --blue-lt:   #6abf80;
  --blue-dim:  #1a3828;
  --text:      #c8ddff;
  --text-mid:  #888888;
  --text-dim:  #555555;
  --white:     #f0f0f0;
}

body { background:var(--bg-deep); font-family:'DM Sans',sans-serif; color:var(--text); }
.wrap { display:flex; flex-direction:column; height:100vh; }

/* ── Material Underline Tabs ── */
.tab-bar {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  padding: 0;
  position: relative;
  display: flex;
}
.tab-buttons {
  display: flex;
  flex: 1;
  position: relative;
}
.tab-btn {
  flex: 1; padding: 15px 10px;
  border: none;
  border-radius: 0;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600;
  color: var(--text-dim); cursor: pointer;
  letter-spacing: .3px;
  transition: all .28s;
  position: relative; overflow: hidden;
  background: transparent;
  text-align: center;
}

/* Active tab: green gradient wash, no border */
.tab-btn.active {
  background: linear-gradient(180deg, rgba(74,144,96,0.32) 0%, rgba(74,144,96,0.08) 100%);
  color: #6abf80;
}

/* Sliding underline indicator — hidden, replaced by card style */
.tab-indicator { display: none; }

/* ── Category pills ── */
.cat-wrap {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.cat-row {
  display:flex; gap:6px; overflow-x:auto; scrollbar-width:none;
  padding: 10px 18px 10px;
}
.cat-row::-webkit-scrollbar { display:none; }
.cat-btn {
  flex-shrink:0; padding:5px 14px; border-radius:14px;
  border: 1px solid #3a3a3a;
  background: none;
  color: #555555;
  font-size:11px; font-weight:500;
  cursor:pointer; transition:all .18s; font-family:'DM Sans',sans-serif;
  white-space:nowrap;
}
.cat-btn.active {
  background: #333333;
  color: #f0f0f0;
  border-color: #666666;
}

/* ── Swipe container ── */
.swipe-outer {
  flex:1; overflow:hidden; position:relative;
}
.swipe-track {
  display: flex;
  width: 200%;
  height: 100%;
  will-change: transform;
  transition: transform .32s cubic-bezier(0.4, 0, 0.2, 1);
}
.swipe-track.no-transition {
  transition: none;
}
.swipe-page {
  width: 50%;
  height: 100%;
  display: flex;
  flex-direction: row;
  overflow: hidden;
}

/* ── Split panels ── */
.left {
  width: 46%; border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}
.book-list {
  flex:1; overflow-y:auto;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
  padding-bottom: 24px;
}
.book-item {
  padding: 11px 14px 10px;
  border-bottom: 1px solid var(--bg-deep);
  cursor: pointer; transition: background .13s;
  border-left: 3px solid transparent;
  display: flex; flex-direction: column; gap: 2px;
}
.book-item:active { background:var(--bg-card); }
.book-item.selected { background:var(--bg-card); border-left-color: var(--blue); }
.book-tamil {
  font-size: 13px; font-family:'Noto Sans Tamil',sans-serif;
  color: var(--text-mid); font-weight:400; line-height:1.3;
}
.book-english {
  font-size: 10px; color:var(--text-dim);
  font-family:'DM Sans',sans-serif; letter-spacing:.2px;
}
.book-item.selected .book-tamil { color:var(--white); }
.book-item.selected .book-english { color:var(--text-mid); }

/* Group header */
.group-header {
  padding: 10px 14px 5px;
  display: flex; align-items: center; gap:8px;
  position: sticky; top:0; z-index:2;
  background: #222222;
}
.group-label {
  font-size: 9px; font-family:'Cinzel',serif;
  letter-spacing: 2px; text-transform:uppercase;
  padding: 3px 8px; border-radius:4px;
  white-space:nowrap; flex-shrink:0; font-weight:600;
}
.group-line {
  flex:1; height:1px;
}

/* Right panel */
.right {
  flex:1; overflow-y:auto;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}
.sec-label {
  padding: 10px 12px 7px;
  font-size: 9px; color:var(--text-dim);
  letter-spacing: 2.5px; text-transform:uppercase;
  font-family:'Cinzel',serif;
  border-bottom: 1px solid var(--bg-deep);
  position:sticky; top:0; background:#222222; z-index:1;
}
.num-grid {
  display:grid; grid-template-columns:repeat(5,1fr);
  gap:5px; padding:8px;
}
.num-btn {
  aspect-ratio:1; border-radius:8px;
  background:var(--bg-item); border:1px solid var(--border);
  color:var(--text-dim); font-size:13px; font-weight:500;
  cursor:pointer; transition:all .12s;
  display:flex; align-items:center; justify-content:center;
  font-family:'DM Sans',sans-serif;
}
.num-btn:active { background:var(--blue-dim); }
.num-btn.sel {
  background:var(--blue); color:#fff;
  border-color:var(--blue);
  box-shadow:0 2px 10px rgba(74,144,96,.45);
  font-weight:700;
}
</style>
</head>
<body>
<div class="wrap">

  <!-- Material underline tabs -->
  <div class="tab-bar">
    <div class="tab-buttons">
      <button class="tab-btn active" id="tab-ot" onclick="switchTab(0)">Old Testament</button>
      <button class="tab-btn" id="tab-nt" onclick="switchTab(1)">New Testament</button>
    </div>
    <div class="tab-indicator" id="tab-indicator"></div>
  </div>

  <!-- Category pills -->
  <div class="cat-wrap">
    <div class="cat-row" id="cat-row"></div>
  </div>

  <!-- Swipeable pages -->
  <div class="swipe-outer" id="swipe-outer">
    <div class="swipe-track" id="swipe-track">

      <!-- OT page -->
      <div class="swipe-page" id="page-ot">
        <div class="left">
          <div class="book-list" id="books-ot"></div>
        </div>
        <div class="right" id="right-ot">
          <div class="sec-label">Chapter</div>
          <div class="num-grid" id="ch-ot"></div>
          <div class="sec-label">Verse</div>
          <div class="num-grid" id="vs-ot"></div>
        </div>
      </div>

      <!-- NT page -->
      <div class="swipe-page" id="page-nt">
        <div class="left">
          <div class="book-list" id="books-nt"></div>
        </div>
        <div class="right" id="right-nt">
          <div class="sec-label">Chapter</div>
          <div class="num-grid" id="ch-nt"></div>
          <div class="sec-label">Verse</div>
          <div class="num-grid" id="vs-nt"></div>
        </div>
      </div>

    </div>
  </div>

</div>
<script>
const OT = [
  {t:'ஆதியாகமம்',e:'Genesis',c:50,g:'Law'},
  {t:'யாத்திராகமம்',e:'Exodus',c:40,g:'Law'},
  {t:'லேவியராகமம்',e:'Leviticus',c:27,g:'Law'},
  {t:'எண்ணாகமம்',e:'Numbers',c:36,g:'Law'},
  {t:'உபாகமம்',e:'Deuteronomy',c:34,g:'Law'},
  {t:'யோசுவா',e:'Joshua',c:24,g:'History'},
  {t:'நியாயாதிபதிகள்',e:'Judges',c:21,g:'History'},
  {t:'ரூத்',e:'Ruth',c:4,g:'History'},
  {t:'1 சாமுவேல்',e:'1 Samuel',c:31,g:'History'},
  {t:'2 சாமுவேல்',e:'2 Samuel',c:24,g:'History'},
  {t:'1 இராஜாக்கள்',e:'1 Kings',c:22,g:'History'},
  {t:'2 இராஜாக்கள்',e:'2 Kings',c:25,g:'History'},
  {t:'1 நாளாகமம்',e:'1 Chronicles',c:29,g:'History'},
  {t:'2 நாளாகமம்',e:'2 Chronicles',c:36,g:'History'},
  {t:'எஸ்றா',e:'Ezra',c:10,g:'History'},
  {t:'நெகேமியா',e:'Nehemiah',c:13,g:'History'},
  {t:'எஸ்தர்',e:'Esther',c:10,g:'History'},
  {t:'யோபு',e:'Job',c:42,g:'Poetry'},
  {t:'சங்கீதம்',e:'Psalms',c:150,g:'Poetry'},
  {t:'நீதிமொழிகள்',e:'Proverbs',c:31,g:'Poetry'},
  {t:'பிரசங்கி',e:'Ecclesiastes',c:12,g:'Poetry'},
  {t:'உன்னதப்பாட்டு',e:'Song of Solomon',c:8,g:'Poetry'},
  {t:'ஏசாயா',e:'Isaiah',c:66,g:'Prophecy'},
  {t:'எரேமியா',e:'Jeremiah',c:52,g:'Prophecy'},
  {t:'புலம்பல்',e:'Lamentations',c:5,g:'Prophecy'},
  {t:'எசேக்கியேல்',e:'Ezekiel',c:48,g:'Prophecy'},
  {t:'தானியேல்',e:'Daniel',c:12,g:'Prophecy'},
  {t:'ஓசியா',e:'Hosea',c:14,g:'Prophecy'},
  {t:'யோவேல்',e:'Joel',c:3,g:'Prophecy'},
  {t:'ஆமோஸ்',e:'Amos',c:9,g:'Prophecy'},
  {t:'ஒபதியா',e:'Obadiah',c:1,g:'Prophecy'},
  {t:'யோனா',e:'Jonah',c:4,g:'Prophecy'},
  {t:'மீகா',e:'Micah',c:7,g:'Prophecy'},
  {t:'நாகூம்',e:'Nahum',c:3,g:'Prophecy'},
  {t:'ஆபகூக்',e:'Habakkuk',c:3,g:'Prophecy'},
  {t:'செப்பனியா',e:'Zephaniah',c:3,g:'Prophecy'},
  {t:'ஆகாய்',e:'Haggai',c:2,g:'Prophecy'},
  {t:'சகரியா',e:'Zechariah',c:14,g:'Prophecy'},
  {t:'மல்கியா',e:'Malachi',c:4,g:'Prophecy'},
];
const NT = [
  {t:'மத்தேயு',e:'Matthew',c:28,g:'Gospel'},
  {t:'மாற்கு',e:'Mark',c:16,g:'Gospel'},
  {t:'லூக்கா',e:'Luke',c:24,g:'Gospel'},
  {t:'யோவான்',e:'John',c:21,g:'Gospel'},
  {t:'அப்போஸ்தலர்',e:'Acts',c:28,g:'History'},
  {t:'ரோமர்',e:'Romans',c:16,g:'Epistle'},
  {t:'1 கொரிந்தியர்',e:'1 Corinthians',c:16,g:'Epistle'},
  {t:'2 கொரிந்தியர்',e:'2 Corinthians',c:13,g:'Epistle'},
  {t:'கலாத்தியர்',e:'Galatians',c:6,g:'Epistle'},
  {t:'எபேசியர்',e:'Ephesians',c:6,g:'Epistle'},
  {t:'பிலிப்பியர்',e:'Philippians',c:4,g:'Epistle'},
  {t:'கொலோசெயர்',e:'Colossians',c:4,g:'Epistle'},
  {t:'1 தெசலோனிக்கேயர்',e:'1 Thessalonians',c:5,g:'Epistle'},
  {t:'2 தெசலோனிக்கேயர்',e:'2 Thessalonians',c:3,g:'Epistle'},
  {t:'1 தீமோத்தேயு',e:'1 Timothy',c:6,g:'Epistle'},
  {t:'2 தீமோத்தேயு',e:'2 Timothy',c:4,g:'Epistle'},
  {t:'தீத்து',e:'Titus',c:3,g:'Epistle'},
  {t:'பிலேமோன்',e:'Philemon',c:1,g:'Epistle'},
  {t:'எபிரேயர்',e:'Hebrews',c:13,g:'Epistle'},
  {t:'யாக்கோபு',e:'James',c:5,g:'Epistle'},
  {t:'1 பேதுரு',e:'1 Peter',c:5,g:'Epistle'},
  {t:'2 பேதுரு',e:'2 Peter',c:3,g:'Epistle'},
  {t:'1 யோவான்',e:'1 John',c:5,g:'Epistle'},
  {t:'2 யோவான்',e:'2 John',c:1,g:'Epistle'},
  {t:'3 யோவான்',e:'3 John',c:1,g:'Epistle'},
  {t:'யூதா',e:'Jude',c:1,g:'Epistle'},
  {t:'வெளிப்படுத்தல்',e:'Revelation',c:22,g:'Prophecy'},
];

const catStyle = {
  All:      { bg:'#1a2a50', color:'#7eb3ff', border:'#3b6fd4' },
  Law:      { bg:'#0e2050', color:'#7eb3ff', border:'#3b6fd4' },
  History:  { bg:'#0a2830', color:'#5dd0e8', border:'#2a90b0' },
  Poetry:   { bg:'#1e1848', color:'#b89fff', border:'#7060c0' },
  Prophecy: { bg:'#301820', color:'#ff8f8f', border:'#c04040' },
  Gospel:   { bg:'#0a2820', color:'#5de89f', border:'#2ab060' },
  Epistle:  { bg:'#28200a', color:'#e8c85d', border:'#b08030' },
};

// Per-testament state
const state = {
  OT: { books: OT, bi: 0, cat: 'All', ch: 1, vs: 1 },
  NT: { books: NT, bi: 0, cat: 'All', ch: 1, vs: 1 },
};
let currentTab = 0; // 0 = OT, 1 = NT
const tabs = ['OT', 'NT'];

/* ── Tab switching ── */
function switchTab(idx, animate = true) {
  currentTab = idx;
  const track = document.getElementById('swipe-track');
  if (!animate) track.classList.add('no-transition');
  track.style.transform = `translateX(-${idx * 50}%)`;
  if (!animate) requestAnimationFrame(() => track.classList.remove('no-transition'));

  document.getElementById('tab-ot').classList.toggle('active', idx === 0);
  document.getElementById('tab-nt').classList.toggle('active', idx === 1);
  document.getElementById('tab-indicator').style.transform = `translateX(${idx * 100}%)`;

  renderCats();
}

/* ── Category pills (for active testament) ── */
function renderCats() {
  const key = tabs[currentTab];
  const s = state[key];
  const books = s.books;
  const cats = ['All'];
  books.forEach(b => { if (!cats.includes(b.g)) cats.push(b.g); });

  const row = document.getElementById('cat-row');
  row.innerHTML = '';
  cats.forEach(cat => {
    const b = document.createElement('button');
    b.className = 'cat-btn' + (s.cat === cat ? ' active' : '');
    b.textContent = cat;
    b.onclick = () => {
      s.cat = cat; s.bi = 0; s.ch = 1; s.vs = 1;
      renderBooks(key); renderRight(key); renderCats();
    };
    row.appendChild(b);
  });
}

/* ── Book list ── */
function renderBooks(key) {
  const s = state[key];
  const list = document.getElementById('books-' + key.toLowerCase());
  list.innerHTML = '';
  const filtered = s.books.filter(b => s.cat === 'All' || b.g === s.cat);
  let lastGroup = null;

  filtered.forEach(b => {
    const realIdx = s.books.indexOf(b);
    const cs = catStyle[b.g] || catStyle.All;

    if (b.g !== lastGroup) {
      lastGroup = b.g;
      const gh = document.createElement('div');
      gh.className = 'group-header';
      gh.innerHTML = `
        <div class="group-label" style="background:${cs.bg};color:${cs.color};border:1px solid ${cs.border}">${b.g}</div>
        <div class="group-line" style="background:linear-gradient(90deg,${cs.border}55,transparent)"></div>
      `;
      list.appendChild(gh);
    }

    const d = document.createElement('div');
    d.className = 'book-item' + (realIdx === s.bi ? ' selected' : '');
    d.innerHTML = `<div class="book-tamil">${b.t}</div><div class="book-english">${b.e}</div>`;
    d.onclick = () => {
      s.bi = realIdx; s.ch = 1; s.vs = 1;
      renderBooks(key); renderRight(key);
      document.getElementById('right-' + key.toLowerCase()).scrollTop = 0;
    };
    list.appendChild(d);
  });
}

/* ── Chapter / Verse grids ── */
function renderRight(key) {
  const s = state[key];
  const book = s.books[s.bi];
  const suffix = key.toLowerCase();
  if (!book) return;

  const cg = document.getElementById('ch-' + suffix); cg.innerHTML = '';
  for (let i = 1; i <= book.c; i++) {
    const b = document.createElement('button');
    b.className = 'num-btn' + (s.ch === i ? ' sel' : '');
    b.textContent = i;
    b.onclick = () => { s.ch = i; s.vs = 1; renderRight(key); };
    cg.appendChild(b);
  }

  const vg = document.getElementById('vs-' + suffix); vg.innerHTML = '';
  for (let i = 1; i <= 30; i++) {
    const b = document.createElement('button');
    b.className = 'num-btn' + (s.vs === i ? ' sel' : '');
    b.textContent = i;
    b.onclick = () => { s.vs = i; renderRight(key); };
    vg.appendChild(b);
  }
}

/* ── Swipe gesture ── */
(function () {
  const outer = document.getElementById('swipe-outer');
  const track = document.getElementById('swipe-track');
  let startX = 0, startY = 0, dx = 0;
  let swiping = false, lockAxis = null;
  const W = () => outer.offsetWidth;

  outer.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    dx = 0; lockAxis = null; swiping = false;
    track.classList.add('no-transition');
  }, { passive: true });

  outer.addEventListener('touchmove', e => {
    const cx = e.touches[0].clientX;
    const cy = e.touches[0].clientY;
    const adx = Math.abs(cx - startX);
    const ady = Math.abs(cy - startY);

    if (!lockAxis) {
      if (adx < 6 && ady < 6) return;
      lockAxis = adx >= ady ? 'x' : 'y';
    }
    if (lockAxis === 'y') return;

    e.preventDefault();
    swiping = true;
    dx = cx - startX;
    const base = currentTab * W();
    const raw  = base - dx;
    // resist at edges
    const clamped = raw < 0 ? raw * 0.25
                  : raw > W() ? W() + (raw - W()) * 0.25
                  : raw;
    track.style.transform = `translateX(${-clamped / (W() * 2) * 100}%)`;
  }, { passive: false });

  outer.addEventListener('touchend', () => {
    track.classList.remove('no-transition');
    if (!swiping) return;
    const threshold = W() * 0.25;
    if (dx < -threshold && currentTab === 0) switchTab(1);
    else if (dx > threshold && currentTab === 1) switchTab(0);
    else switchTab(currentTab); // snap back
  });
})();

/* ── Init ── */
renderBooks('OT'); renderRight('OT');
renderBooks('NT'); renderRight('NT');
renderCats();
</script>
</body>
</html>
