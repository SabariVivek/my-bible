<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GENESIS_AI · Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --neon:  #00ff9d;
    --neon2: #ff2d78;
    --neon3: #00cfff;
    --bg:    #070b0f;
    --bg2:   #0d1117;
    --ink:   #c8ffe8;
    --dim:   #445;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }

  /* scanlines */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 9999; pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0.18) 4px
    );
  }

  /* grid lines */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      repeating-linear-gradient(0deg,   transparent, transparent 39px, rgba(0,255,157,0.03) 39px, rgba(0,255,157,0.03) 40px),
      repeating-linear-gradient(90deg,  transparent, transparent 79px, rgba(0,255,157,0.02) 79px, rgba(0,255,157,0.02) 80px);
  }

  /* ── LAYOUT ── */
  #shell {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    height: 100vh;
  }

  /* top bar */
  #topbar {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 12px;
    padding: 10px 18px;
    background: rgba(0,255,157,0.04);
    border-bottom: 1px solid rgba(0,255,157,0.12);
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot.r { background: #ff2d78; box-shadow: 0 0 6px #ff2d78; }
  .dot.y { background: #ffd700; box-shadow: 0 0 6px #ffd700; }
  .dot.g { background: #00ff9d; box-shadow: 0 0 6px #00ff9d; }
  #topbar-title {
    flex: 1; text-align: center;
    font-size: 11px; letter-spacing: 4px; color: rgba(0,255,157,.6);
  }
  #status-badge {
    font-size: 10px; letter-spacing: 2px;
    padding: 3px 10px; border: 1px solid rgba(0,255,157,.3);
    color: var(--neon); background: rgba(0,255,157,.06);
    border-radius: 2px;
    transition: color .3s, border-color .3s;
  }

  /* scroll area */
  #viewport {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 32px 24px 100px;
    scroll-behavior: smooth;
  }
  #viewport::-webkit-scrollbar { width: 4px; }
  #viewport::-webkit-scrollbar-track { background: transparent; }
  #viewport::-webkit-scrollbar-thumb { background: rgba(0,255,157,.2); border-radius: 2px; }

  /* bottom bar */
  #bottombar {
    flex-shrink: 0;
    padding: 10px 18px;
    border-top: 1px solid rgba(0,255,157,0.1);
    background: rgba(0,0,0,.5);
    display: flex; align-items: center; gap: 12px;
  }
  #prompt { color: var(--neon); font-size: 12px; letter-spacing: 1px; }
  #input-area { flex: 1; color: #fff; font-size: 12px; letter-spacing: 1px; caret-color: var(--neon); }
  .blink-cursor { display: inline-block; animation: blink .65s step-end infinite; }

  /* ── IDLE SCREEN ── */
  #idle {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%;
    padding: 20px;
    text-align: center;
  }
  #idle-logo {
    font-size: 42px; font-weight: 900; letter-spacing: 6px;
    color: #fff;
    text-shadow: 0 0 40px var(--neon), 0 0 80px rgba(0,255,157,.3);
    margin-bottom: 6px;
    animation: flicker 8s infinite;
  }
  #idle-sub { font-size: 11px; color: var(--neon3); letter-spacing: 4px; margin-bottom: 8px; }
  #idle-desc { font-size: 10px; color: rgba(0,255,157,.4); letter-spacing: 2px; margin-bottom: 40px; }

  .boot-btn {
    background: transparent;
    border: 2px solid var(--neon);
    color: var(--neon);
    padding: 13px 36px;
    font-size: 13px; font-weight: 700; letter-spacing: 3px;
    cursor: pointer; font-family: 'Share Tech Mono', monospace;
    box-shadow: 0 0 24px rgba(0,255,157,.25), inset 0 0 12px rgba(0,255,157,.05);
    text-shadow: 0 0 8px var(--neon);
    transition: all .2s;
  }
  .boot-btn:hover {
    background: rgba(0,255,157,.08);
    box-shadow: 0 0 40px rgba(0,255,157,.4), inset 0 0 20px rgba(0,255,157,.1);
  }

  /* ── SKELETON LOADER ── */
  #skeleton {
    display: none;
    max-width: 640px;
    margin: 0 auto;
  }

  @keyframes shimmer {
    0%   { background-position: -600px 0; }
    100% { background-position: 600px 0; }
  }

  .sk-bar {
    border-radius: 2px;
    background: linear-gradient(
      90deg,
      rgba(0,255,157,0.04) 0%,
      rgba(0,255,157,0.13) 40%,
      rgba(0,255,157,0.04) 80%
    );
    background-size: 600px 100%;
    animation: shimmer 1.6s infinite linear;
  }

  /* heading skeleton */
  .sk-heading { margin-bottom: 28px; }
  .sk-tag  { height: 9px;  width: 200px; margin-bottom: 10px; }
  .sk-h1   { height: 28px; width: 260px; margin-bottom: 8px;  }
  .sk-sub  { height: 11px; width: 160px; }

  /* intro skeleton */
  .sk-intro {
    border-left: 2px solid rgba(0,255,157,.2);
    padding-left: 14px;
    margin-bottom: 20px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .sk-line-full  { height: 11px; width: 100%; }
  .sk-line-long  { height: 11px; width: 85%; }
  .sk-line-short { height: 11px; width: 65%; }

  /* section label skeleton */
  .sk-section { display: flex; align-items: center; gap: 10px; margin: 26px 0 14px; }
  .sk-arrow  { height: 9px; width: 9px; flex-shrink: 0; }
  .sk-slabel { height: 9px; width: 160px; flex-shrink: 0; }
  .sk-sline  { flex: 1; height: 1px; background: rgba(0,255,157,.07); }

  /* day skeleton */
  .sk-day {
    display: flex; gap: 10px;
    margin-bottom: 13px;
    padding: 10px 12px;
    border: 1px solid rgba(0,255,157,.05);
    border-radius: 2px;
  }
  .sk-daynum { height: 12px; width: 28px; flex-shrink: 0; margin-top: 2px; }
  .sk-daybody { flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .sk-daylabel { height: 11px; width: 100px; }
  .sk-daytext  { height: 10px; width: 100%; }
  .sk-daytext2 { height: 10px; width: 75%; }

  /* quote skeleton */
  .sk-quote {
    border: 1px solid rgba(0,255,157,.1);
    background: rgba(0,255,157,.02);
    padding: 16px 18px;
    margin: 22px 0;
    border-radius: 2px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .sk-qline1 { height: 12px; width: 95%; }
  .sk-qline2 { height: 12px; width: 80%; }
  .sk-qref   { height: 8px;  width: 120px; margin-top: 4px; }

  /* ── CONTENT BLOCKS ── */
  .block { animation: fadeUp .3s ease; }

  /* heading */
  .b-heading { margin-bottom: 28px; }
  .b-heading .tag { font-size: 10px; color: var(--neon); letter-spacing: 3px; margin-bottom: 6px; }
  .b-heading h1 {
    font-size: 26px; font-weight: 900; color: #fff;
    text-shadow: 0 0 20px var(--neon);
    line-height: 1.15; margin-bottom: 4px;
    font-family: 'Share Tech Mono', monospace;
  }
  .b-heading .sub { font-size: 13px; color: var(--neon3); }

  /* intro */
  .b-intro {
    font-family: 'Noto Sans Tamil', sans-serif;
    font-size: 14px; line-height: 1.85; color: #a0ffd0;
    padding-left: 14px;
    border-left: 2px solid var(--neon);
    margin-bottom: 20px;
  }

  /* section label */
  .b-section-label {
    display: flex; align-items: center; gap: 10px;
    font-size: 10px; color: var(--neon2);
    letter-spacing: 3px; text-transform: uppercase;
    margin: 26px 0 14px;
  }
  .b-section-label .arrow { color: var(--neon2); }
  .b-section-label .line {
    flex: 1; height: 1px;
    background: linear-gradient(to right, var(--neon2), transparent);
  }

  /* day */
  .b-day {
    display: flex; gap: 10px;
    margin-bottom: 13px;
    padding: 10px 12px;
    background: rgba(0,255,157,.02);
    border: 1px solid rgba(0,255,157,.07);
    border-radius: 2px;
    transition: background .2s;
  }
  .b-day:hover { background: rgba(0,255,157,.05); }
  .b-day .day-num { color: var(--neon); font-size: 12px; min-width: 32px; margin-top: 1px; }
  .b-day .day-label { color: var(--neon3); font-weight: 700; font-size: 13px; }
  .b-day .day-text { font-family: 'Noto Sans Tamil', sans-serif; color: #c8ffe8; font-size: 13px; line-height: 1.8; }

  /* quote */
  .b-quote {
    border: 1px solid rgba(0,255,157,.3);
    background: rgba(0,255,157,.04);
    padding: 16px 18px;
    margin: 22px 0;
    box-shadow: 0 0 20px rgba(0,255,157,.08);
    border-radius: 2px;
  }
  .b-quote p {
    font-family: 'Noto Sans Tamil', sans-serif;
    font-size: 14px; color: var(--neon);
    font-style: italic; line-height: 1.75; margin-bottom: 8px;
  }
  .b-quote .ref { font-size: 10px; color: #445; letter-spacing: 2px; }

  /* key points */
  .b-key {
    margin-bottom: 11px;
    font-size: 13px;
  }
  .b-key .kn  { color: var(--neon2); }
  .b-key .kl  { color: var(--neon3); font-weight: 700; }
  .b-key .kt  { font-family: 'Noto Sans Tamil', sans-serif; color: #b0e8d0; line-height: 1.8; }

  /* streaming cursor */
  #stream-cursor {
    font-size: 14px; color: var(--neon);
    margin-top: 12px;
    display: none;
  }
  #stream-cursor span { animation: blink .5s step-end infinite; }

  /* done bar */
  #done-bar {
    display: none;
    gap: 10px;
    margin-top: 28px;
    padding-top: 18px;
    border-top: 1px solid rgba(0,255,157,.12);
  }
  .done-btn {
    background: transparent;
    border: 1px solid #333; color: #555;
    padding: 7px 16px; font-size: 11px;
    cursor: pointer; letter-spacing: 1px;
    font-family: 'Share Tech Mono', monospace;
    transition: all .15s;
  }
  .done-btn:hover { border-color: var(--neon); color: var(--neon); }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes flicker {
    0%, 96%, 100% { opacity: 1; }
    97% { opacity: .7; }
    98% { opacity: 1; }
    99% { opacity: .5; }
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* progress bar at top of skeleton */
  #sk-progress-wrap {
    width: 100%; height: 2px;
    background: rgba(0,255,157,.08);
    margin-bottom: 28px;
    border-radius: 1px;
    overflow: hidden;
  }
  #sk-progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, var(--neon), var(--neon3));
    box-shadow: 0 0 8px var(--neon);
    transition: width .1s linear;
  }
</style>
</head>
<body>

<div id="shell">

  <!-- TOP BAR -->
  <div id="topbar">
    <div class="dot r"></div>
    <div class="dot y"></div>
    <div class="dot g"></div>
    <div id="topbar-title">GENESIS_AI · TERMINAL · v1.0</div>
    <div id="status-badge">READY</div>
  </div>

  <!-- SCROLL AREA -->
  <div id="viewport">

    <!-- IDLE -->
    <div id="idle">
      <div id="idle-logo">GENESIS_AI</div>
      <div id="idle-sub">CHAPTER_01 · CREATION_SEQUENCE</div>
      <div id="idle-desc">// SYSTEM READY · AWAITING COMMAND</div>
      <button class="boot-btn" onclick="startStream()">EXECUTE →</button>
    </div>

    <!-- SKELETON (shown while loading) -->
    <div id="skeleton">
      <!-- progress bar -->
      <div id="sk-progress-wrap"><div id="sk-progress-bar"></div></div>

      <!-- heading skeleton -->
      <div class="sk-heading">
        <div class="sk-bar sk-tag" style="animation-delay:.00s"></div>
        <div style="height:8px"></div>
        <div class="sk-bar sk-h1"  style="animation-delay:.05s"></div>
        <div style="height:6px"></div>
        <div class="sk-bar sk-sub" style="animation-delay:.10s"></div>
      </div>

      <!-- intro skeleton -->
      <div class="sk-intro">
        <div class="sk-bar sk-line-full"  style="animation-delay:.15s"></div>
        <div class="sk-bar sk-line-long"  style="animation-delay:.20s"></div>
        <div class="sk-bar sk-line-short" style="animation-delay:.25s"></div>
      </div>

      <!-- section label skeleton -->
      <div class="sk-section">
        <div class="sk-bar sk-arrow" style="animation-delay:.30s"></div>
        <div class="sk-bar sk-slabel" style="animation-delay:.32s"></div>
        <div class="sk-sline"></div>
      </div>

      <!-- 4 day skeletons -->
      <div class="sk-day">
        <div class="sk-bar sk-daynum" style="animation-delay:.35s"></div>
        <div class="sk-daybody">
          <div class="sk-bar sk-daylabel" style="animation-delay:.37s"></div>
          <div class="sk-bar sk-daytext"  style="animation-delay:.39s"></div>
          <div class="sk-bar sk-daytext2" style="animation-delay:.41s"></div>
        </div>
      </div>
      <div class="sk-day">
        <div class="sk-bar sk-daynum" style="animation-delay:.43s"></div>
        <div class="sk-daybody">
          <div class="sk-bar sk-daylabel" style="animation-delay:.45s"></div>
          <div class="sk-bar sk-daytext"  style="animation-delay:.47s"></div>
          <div class="sk-bar sk-daytext2" style="animation-delay:.49s"></div>
        </div>
      </div>
      <div class="sk-day">
        <div class="sk-bar sk-daynum" style="animation-delay:.51s"></div>
        <div class="sk-daybody">
          <div class="sk-bar sk-daylabel" style="animation-delay:.53s"></div>
          <div class="sk-bar sk-daytext"  style="animation-delay:.55s"></div>
          <div class="sk-bar sk-daytext2" style="animation-delay:.57s"></div>
        </div>
      </div>
      <div class="sk-day">
        <div class="sk-bar sk-daynum" style="animation-delay:.59s"></div>
        <div class="sk-daybody">
          <div class="sk-bar sk-daylabel" style="animation-delay:.61s"></div>
          <div class="sk-bar sk-daytext"  style="animation-delay:.63s"></div>
          <div class="sk-bar sk-daytext2" style="animation-delay:.65s"></div>
        </div>
      </div>

      <!-- quote skeleton -->
      <div class="sk-quote">
        <div class="sk-bar sk-qline1" style="animation-delay:.70s"></div>
        <div class="sk-bar sk-qline2" style="animation-delay:.73s"></div>
        <div class="sk-bar sk-qref"   style="animation-delay:.76s"></div>
      </div>
    </div>

    <!-- CONTENT (hidden until data ready) -->
    <div id="content" style="display:none; max-width: 640px; margin: 0 auto;">
      <div id="blocks"></div>
      <div id="stream-cursor"><span>█</span></div>
      <div id="done-bar">
        <button class="done-btn" onclick="resetStream()">↺ RESET</button>
        <button class="done-btn" onclick="copyContent()">📋 COPY</button>
      </div>
      <div id="anchor"></div>
    </div>

  </div>

  <!-- BOTTOM BAR -->
  <div id="bottombar">
    <div id="prompt">genesis:~$</div>
    <div id="input-area"><span id="cmd-text"></span><span class="blink-cursor">_</span></div>
  </div>

</div>

<script>
const SECTIONS = [
  { type: "heading",       text: "ஆதியாகமம் 1",      sub: "படைப்பின் வரிசை" },
  { type: "intro",         text: "தேவன் உலகத்தையும் அதில் உள்ளவற்றையும் ஆறு நாட்களில் எவ்வாறு படைத்தார் என்பதை இந்த அதிகாரம் விவரிக்கிறது." },
  { type: "section-label", text: "படைப்பின் ஆறு நாட்கள்" },
  { type: "day",  day:"01", label:"முதல் நாள்",    text:"தேவன் வானத்தையும் பூமியையும் படைத்தார். வெளிச்சத்திற்கு பகல் என்றும் இருளுக்கு இரவு என்றும் பெயரிட்டார்." },
  { type: "day",  day:"02", label:"இரண்டாம் நாள்", text:"தேவன் ஆகாயவிரிவை (வானம்) உண்டாக்கி, ஜலத்தைப் பிரித்தார்." },
  { type: "day",  day:"03", label:"மூன்றாம் நாள்",  text:"தரைக்கு பூமி என்றும், ஜலத்திற்கு சமுத்திரம் என்றும் பெயரிட்டார். பூமி புல், செடி, மரங்களை முளைக்கச் செய்தது." },
  { type: "day",  day:"04", label:"நான்காம் நாள்",  text:"பெரிய சுடரையும் (சூரியன்), சிறிய சுடரையும் (சந்திரன்), நட்சத்திரங்களையும் படைத்தார்." },
  { type: "day",  day:"05", label:"ஐந்தாம் நாள்",  text:"மீன்களையும் பறவைகளையும் தேவன் படைத்தார்." },
  { type: "day",  day:"06", label:"ஆறாம் நாள்",    text:"மிருகங்கள், பிராணிகள் படைத்தார். இறுதியாக தம் சாயலில் மனுஷனைப் படைத்தார்." },
  { type: "quote", text:"தேவன் தாம் உண்டாக்கின எல்லாவற்றையும் பார்த்தார், அது மிகவும் நன்றாயிருந்தது.", ref:"ஆதியாகமம் 1:31" },
  { type: "section-label", text: "முக்கிய குறிப்புகள்" },
  { type: "key", num:"1", label:"வார்த்தையினால் படைப்பு",  text:'"உண்டாகக்கவது" என்று கட்டளையிட உடனே அனைத்தும் உருவானது.' },
  { type: "key", num:"2", label:"மனுஷனின் அதிகாரம்",      text:"சகல ஜீவஜந்துக்களையும் ஆளுகை செய்ய மனுஷனுக்கு அதிகாரம் வழங்கப்பட்டது." },
  { type: "key", num:"3", label:"தேவ சாயல்",              text:"மனிதன் தேவனுடைய சாயலில் படைக்கப்பட்டான் என்பது இந்த அதிகாரத்தின் சிறப்பம்சமாகும்." },
];

const SKELETON_DURATION = 1800; // ms to show skeleton

let timer = null;
let count = 0;
let phase = "idle";
let progressInterval = null;

const idle      = document.getElementById("idle");
const skeleton  = document.getElementById("skeleton");
const content   = document.getElementById("content");
const blocks    = document.getElementById("blocks");
const cursor    = document.getElementById("stream-cursor");
const doneBar   = document.getElementById("done-bar");
const anchor    = document.getElementById("anchor");
const badge     = document.getElementById("status-badge");
const cmdText   = document.getElementById("cmd-text");
const progressBar = document.getElementById("sk-progress-bar");

function typeCMD(str, cb) {
  let i = 0;
  cmdText.textContent = "";
  const t = setInterval(() => {
    cmdText.textContent += str[i++];
    if (i >= str.length) { clearInterval(t); if (cb) cb(); }
  }, 45);
}

function animateProgress(duration, cb) {
  const start = performance.now();
  progressInterval = requestAnimationFrame(function tick(now) {
    const elapsed = now - start;
    const pct = Math.min((elapsed / duration) * 100, 95); // never reach 100 during skeleton
    progressBar.style.width = pct + "%";
    if (elapsed < duration) {
      progressInterval = requestAnimationFrame(tick);
    } else {
      // snap to 100 then fire callback
      progressBar.style.width = "100%";
      setTimeout(cb, 120);
    }
  });
}

function startStream() {
  phase = "loading";
  typeCMD("run genesis --chapter=1 --lang=ta", () => {
    setTimeout(() => {
      // show skeleton
      idle.style.display = "none";
      skeleton.style.display = "block";
      badge.textContent = "LOADING";
      badge.style.color = "#00cfff";
      badge.style.borderColor = "rgba(0,207,255,.4)";

      // animate progress bar across skeleton duration
      animateProgress(SKELETON_DURATION, () => {
        // hide skeleton → show content
        skeleton.style.display = "none";
        content.style.display = "block";
        cursor.style.display = "block";
        badge.textContent = "STREAMING";
        badge.style.color = "#00ff9d";
        badge.style.borderColor = "rgba(0,255,157,.4)";
        phase = "streaming";
        count = 0;
        blocks.innerHTML = "";
        tick();
      });
    }, 300);
  });
}

function tick() {
  timer = setInterval(() => {
    if (count >= SECTIONS.length) {
      clearInterval(timer);
      phase = "done";
      cursor.style.display = "none";
      doneBar.style.display = "flex";
      badge.textContent = "DONE";
      badge.style.color = "#ffd700";
      badge.style.borderColor = "rgba(255,215,0,.35)";
      cmdText.textContent = "// execution complete ✓";
      return;
    }
    renderBlock(SECTIONS[count], count);
    count++;
    anchor.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }, 220);
}

function renderBlock(s, i) {
  const el = document.createElement("div");
  el.className = "block";

  switch (s.type) {
    case "heading":
      el.className += " b-heading";
      el.innerHTML = `
        <div class="tag">[ GENESIS_v1.0 · CHAPTER_01 ]</div>
        <h1>${s.text}</h1>
        <div class="sub">${s.sub}</div>
      `;
      break;

    case "intro":
      el.className += " b-intro";
      el.textContent = s.text;
      break;

    case "section-label":
      el.className += " b-section-label";
      el.innerHTML = `<span class="arrow">▸</span><span>${s.text.toUpperCase()}</span><div class="line"></div>`;
      break;

    case "day":
      el.className += " b-day";
      el.innerHTML = `
        <span class="day-num">[${s.day}]</span>
        <div>
          <span class="day-label">${s.label}: </span>
          <span class="day-text">${s.text}</span>
        </div>
      `;
      break;

    case "quote":
      el.className += " b-quote";
      el.innerHTML = `
        <p>"${s.text}"</p>
        <span class="ref">// ${s.ref}</span>
      `;
      break;

    case "key":
      el.className += " b-key";
      el.innerHTML = `
        <span class="kn">#${s.num} </span>
        <span class="kl">${s.label}: </span>
        <span class="kt">${s.text}</span>
      `;
      break;
  }

  blocks.appendChild(el);
}

function resetStream() {
  clearInterval(timer);
  cancelAnimationFrame(progressInterval);
  phase = "idle";
  count = 0;
  blocks.innerHTML = "";
  cursor.style.display = "none";
  doneBar.style.display = "none";
  content.style.display = "none";
  skeleton.style.display = "none";
  idle.style.display = "flex";
  progressBar.style.width = "0%";
  badge.textContent = "READY";
  badge.style.color = "var(--neon)";
  badge.style.borderColor = "rgba(0,255,157,.3)";
  cmdText.textContent = "";
}

function copyContent() {
  const lines = SECTIONS.map(s => {
    if (s.type === "heading") return `${s.text} — ${s.sub}`;
    if (s.type === "intro")   return s.text;
    if (s.type === "section-label") return `\n[ ${s.text} ]`;
    if (s.type === "day")     return `[${s.day}] ${s.label}: ${s.text}`;
    if (s.type === "quote")   return `"${s.text}" — ${s.ref}`;
    if (s.type === "key")     return `#${s.num} ${s.label}: ${s.text}`;
    return "";
  }).join("\n");
  navigator.clipboard?.writeText(lines);
  const b = document.querySelectorAll(".done-btn")[1];
  b.textContent = "✓ COPIED";
  setTimeout(() => b.textContent = "📋 COPY", 1800);
}
</script>
