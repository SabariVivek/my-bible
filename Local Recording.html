<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#e8e0d0">
    <title>Bible Study Series</title>
    <style>
        /* ── Password Gate ─────────────────────────────────────────────────── */
        #passwordGate {
            position: fixed;
            inset: 0;
            background-color: var(--bg-canvas);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        .gate-verse-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 28px 20px 28px;
            text-align: center;
            gap: 14px;
            max-width: 480px;
            width: 100%;
        }

        .gate-verse-label {
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #000000;
            background: #fde047;
            border: 2px solid #000000;
            padding: 3px 10px;
            box-shadow: 3px 3px 0px #000000;
        }

        .gate-verse-text {
            font-size: 1.25rem;
            font-weight: 900;
            color: #000000;
            line-height: 1.45;
            letter-spacing: -0.3px;
            margin: 0;
        }

        .gate-verse-text em {
            font-style: normal;
            background: #fde047;
            padding: 0 3px;
        }

        .gate-verse-ref {
            font-size: 0.78rem;
            font-weight: 700;
            color: #4b5563;
            letter-spacing: 0.5px;
        }

        #passwordGate.hidden {
            display: none;
        }

        .gate-box {
            background: #ffffff;
            border-top: 4px solid #000000;
            border-left: 4px solid #000000;
            border-right: 4px solid #000000;
            box-shadow: 0px -6px 0px #000000;
            padding: 28px 24px 40px 24px;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            border-radius: 0;
            animation: slideUp 0.35s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to   { transform: translateY(0); }
        }

        .gate-title-block {
            background-color: #fde047;
            border: 3px solid #000000;
            padding: 6px 18px;
            transform: rotate(-2deg);
            box-shadow: 4px 4px 0px #000000;
        }

        .gate-title-block h2 {
            font-size: 1.2rem;
            font-weight: 900;
            color: #000000;
            letter-spacing: -0.5px;
        }

        /* PIN dots display */
        .pin-display {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            border: 3px solid #000000;
            box-shadow: 4px 4px 0px #000000;
            width: 100%;
            background: #f3f0ea;
        }

        .pin-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #000000;
            background: transparent;
            transition: background 0.15s;
        }

        .pin-dot.filled {
            background: #000000;
        }

        /* Keypad grid */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
        }

        .key-btn {
            background: #ffffff;
            border: 2px solid #000000;
            box-shadow: 3px 3px 0px #000000;
            font-family: inherit;
            font-size: 1.3rem;
            font-weight: 900;
            padding: 16px 8px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.1s, box-shadow 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .key-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000000;
        }

        .key-btn.key-del {
            background: #fde047;
            font-size: 1.3rem;
            color: #000000;
        }

        .gate-error {
            font-size: 0.8rem;
            font-weight: 900;
            color: #ef4444;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: none;
            text-align: center;
        }

        .gate-error.visible {
            display: block;
        }

        /* Neo-Brutalist High-Contrast Light Palette */
        :root {
            --bg-canvas: #e8e0d0;      /* Warm tan parchment */
            --bg-card: #fef9ee;        /* Warm cream card */
            --raw-black: #000000;      /* Absolute black for strokes & harsh shadows */
            --brutal-yellow: #fde047;  /* High-visibility yellow accent */
            --brutal-blue: #60a5fa;    /* Electric industrial blue */
            --brutal-red: #ef4444;     /* Warning destructive red */
            --text-main: #000000;
            --text-muted: #4b5563;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-canvas);
            color: var(--text-main);
            padding: 0;
            min-height: 100vh;
            display: flex;
            overscroll-behavior-y: none;
            flex-direction: column;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            padding: 40px 16px 140px 16px;
            background-color: var(--bg-canvas);
            min-height: 100vh;
        }

        /* Balanced Flexbox Header Layout */
        header {
            margin-bottom: 16px;
            padding: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brutal-title-block {
            background-color: var(--brutal-yellow);
            color: var(--raw-black);
            border: 3px solid var(--raw-black);
            padding: 6px 16px;
            display: inline-block;
            transform: rotate(-2.5deg);
            box-shadow: 4px 4px 0px var(--raw-black);
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            margin: 0;
        }

        .top-folders-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 16px;
            padding-top: 16px;
        }

        .top-folders-container::-webkit-scrollbar { display: none; }

        .small-folder-chip {
            background: #fff;
            border: 2px solid var(--raw-black);
            box-shadow: 2px 2px 0px var(--raw-black);
            border-radius: 4px;
            padding: 5px 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            font-weight: 800;
            font-size: 12px;
            font-family: inherit;
            transition: transform 0.05s, box-shadow 0.05s;
        }

        .small-folder-chip.active {
            background: var(--raw-black);
            color: #fff;
        }

        .small-folder-chip:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px var(--raw-black);
        }

        /* Global Stop Context Button Asset */
        .global-stop-btn {
            background-color: var(--brutal-red);
            color: #ffffff;
            border: 2px solid #ffffff;
            font-family: inherit;
            font-size: 1.3rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0px 8px 24px rgba(0,0,0,0.2);
            display: none;
            align-items: center;
            justify-content: center;
            width: 48px;
            flex-shrink: 0;
        }

        .global-stop-btn.active {
            display: flex;
        }

        .notes-pill-btn {
            background-color: #60a5fa;
            border: 2px solid #000000;
            width: 48px;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0px 8px 24px rgba(0,0,0,0.2);
        }

        /* ── Notes Bottom Sheet ────────────────────────────────────────────── */
        .notes-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9998;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }

        .notes-overlay.hidden {
            display: none;
        }

        .notes-box {
            background: #fef9ee;
            border-top: 4px solid #000000;
            border-left: 4px solid #000000;
            border-right: 4px solid #000000;
            box-shadow: 0px -6px 0px #000000;
            width: 100%;
            max-width: 480px;
            max-height: 82vh;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.35s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .notes-drag-handle {
            width: 40px;
            height: 4px;
            background: #d1d5db;
            border-radius: 2px;
            margin: 12px auto 0 auto;
            flex-shrink: 0;
        }

        .notes-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px 0 20px;
            flex-shrink: 0;
        }

        .notes-title-pill {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .notes-tag {
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: #000000;
            color: #fde047;
            padding: 2px 10px;
            border-radius: 20px;
        }

        .notes-close-btn {
            background-color: #ff6060;
            color: var(--raw-black);
            border: 2px solid var(--raw-black);
            font-size: 0.95rem;
            font-weight: 900;
            cursor: pointer;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 0px var(--raw-black);
            transition: transform 0.1s, box-shadow 0.1s;
            flex-shrink: 0;
        }

        .notes-close-btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px var(--raw-black);
        }

        .notes-track-title {
            font-size: 1.15rem;
            font-weight: 900;
            padding: 8px 20px 14px 20px;
            border-bottom: 2px solid #000000;
            flex-shrink: 0;
            letter-spacing: -0.3px;
        }

        .notes-scroll-area {
            overflow-y: auto;
            padding: 20px 20px 36px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .notes-section-label {
            font-size: 0.6rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .notes-summary-text {
            position: relative;
            font-size: 0.85rem;
            font-style: italic;
            line-height: 1.7;
            color: #1c1c1c;
            padding: 10px 14px 10px 44px;
            background: #fffbea;
            border: 2px solid #000;
            box-shadow: 3px 3px 0px #000;
        }

        .notes-summary-text::before {
            content: '\201C';
            position: absolute;
            left: 10px;
            top: 2px;
            font-size: 3rem;
            font-style: normal;
            font-weight: 900;
            color: #fde047;
            line-height: 1;
            -webkit-text-stroke: 1.5px #000;
        }

        .notes-passage-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .notes-passage-item {
            display: flex;
            align-items: stretch;
            gap: 0;
            background: #ffffff;
            border: 2px solid #000000;
            box-shadow: 3px 3px 0px #000000;
            overflow: hidden;
        }

        .notes-passage-num {
            background: #000000;
            color: #ffffff;
            font-size: 0.65rem;
            font-weight: 900;
            width: 28px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 0.5px;
        }

        .notes-passage-accent {
            width: 4px;
            background: #fca5a5;
            flex-shrink: 0;
        }

        .notes-passage-body {
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex: 1;
        }

        .notes-passage-ref {
            font-size: 0.78rem;
            font-weight: 900;
            color: #000000;
            line-height: 1.2;
        }

        .notes-passage-summary {
            font-size: 0.73rem;
            color: #4b5563;
            line-height: 1.45;
        }

        .notes-principle-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .notes-principle-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 0.8rem;
            line-height: 1.5;
            color: #1c1c1c;
        }

        .notes-principle-dot {
            width: 8px;
            height: 8px;
            background: #fca5a5;
            border: 1.5px solid #000;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 5px;
        }

        /* ── Sermon Sections ─────────────────────────────────────────────── */
        .notes-sermon-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .notes-sermon-section {
            border: 2px solid #000;
            box-shadow: 3px 3px 0px #000;
            overflow: hidden;
        }

        .notes-sermon-title {
            background: #000000;
            color: #fde047;
            font-size: 0.72rem;
            font-weight: 900;
            padding: 6px 12px;
            letter-spacing: 0.3px;
        }

        .notes-sermon-points {
            list-style: none;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #ffffff;
        }

        .notes-sermon-point {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 0.78rem;
            line-height: 1.45;
            color: #1c1c1c;
        }

        .notes-sermon-bullet {
            width: 6px;
            height: 6px;
            background: #fde047;
            border: 1.5px solid #000;
            flex-shrink: 0;
            margin-top: 5px;
        }

        /* ── Jesus Fulfillment ───────────────────────────────────────────── */
        .notes-fulfillment-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .notes-fulfillment-item {
            border: 2px solid #000;
            box-shadow: 4px 4px 0px #000;
            overflow: hidden;
        }

        .notes-fulfillment-ot {
            display: flex;
            align-items: stretch;
            background: #fffbea;
        }

        .notes-fulfillment-nt {
            display: flex;
            align-items: stretch;
            background: #f0fdf4;
        }

        .notes-fulfillment-strip {
            width: 5px;
            flex-shrink: 0;
        }

        .notes-fulfillment-ot .notes-fulfillment-strip {
            background: #f59e0b;
        }

        .notes-fulfillment-nt .notes-fulfillment-strip {
            background: #22c55e;
        }

        .notes-fulfillment-body {
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex: 1;
        }

        .notes-fulfillment-label {
            font-size: 0.58rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .notes-fulfillment-ot .notes-fulfillment-label {
            color: #92400e;
        }

        .notes-fulfillment-nt .notes-fulfillment-label {
            color: #14532d;
        }

        .notes-fulfillment-text {
            font-size: 0.78rem;
            line-height: 1.45;
            color: #1c1c1c;
        }

        .notes-fulfillment-connector {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 12px;
            background: #000000;
        }

        .notes-fulfillment-connector-line {
            flex: 1;
            height: 1px;
            background: #444;
        }

        .notes-fulfillment-connector-text {
            font-size: 0.58rem;
            font-weight: 900;
            color: #fde047;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            padding: 4px 0;
        }

        /* Playlist Structural Architecture */
        .playlist {
            list-style: none;
        }

        .track-item.important {
            background-color: #e0f2fe;
            border-color: #0284c7;
            box-shadow: 4px 4px 0px #0284c7;
        }

        .track-item.important.playing {
            background-color: #fde047;
            border-color: var(--raw-black);
            box-shadow: 6px 6px 0px var(--raw-black);
        }

        .important-badge {
            position: absolute;
            top: -12px;
            right: 15px;
            background: #ff5757;
            color: #ffffff;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 0.5px;
            padding: 3px 10px;
            border: 2px solid #000000;
            box-shadow: 2px 2px 0px #000000;
            border-radius: 4px;
            text-transform: uppercase;
            z-index: 10;
        }

        .track-item {
            background-color: var(--bg-card);
            padding: 18px;
            margin-bottom: 20px;
            border: 3px solid var(--raw-black);
            cursor: pointer;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            box-shadow: 4px 4px 0px var(--raw-black);
            transition: all 0.15s ease-in-out;
            -webkit-tap-highlight-color: transparent;
        }

        .track-item:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--raw-black);
        }

        .track-item.playing {
            background-color: #fde047;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--raw-black);
        }

        .track-content {
            flex: 1;
            min-width: 0;
            padding-right: 12px;
        }

        .track-meta-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
        }

        .track-title {
            font-size: 1rem;
            font-weight: 800;
            line-height: 1.3;
            white-space: normal;
            word-break: break-word;
        }

        .track-desc {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-muted);
            line-height: 1.4;
            margin-top: 4px;
        }

        .track-item.playing .track-desc {
            color: var(--raw-black);
        }

        .day-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            background-color: #fecaca;
            color: #b91c1c;
            border: 1.5px solid #fca5a5;
            padding: 2px 9px;
            letter-spacing: 0.4px;
            white-space: nowrap;
            border-radius: 20px;
        }

        .track-item.playing .day-badge {
            background-color: #fca5a5;
            color: #7f1d1d;
            border-color: #ef4444;
        }

        .day-number-badge {
            display: inline-flex;
            align-items: center;
            font-size: 0.7rem;
            font-weight: 600;
            background-color: #000000;
            color: #ffffff;
            border-radius: 20px;
            padding: 2px 9px;
            letter-spacing: 0.4px;
            white-space: nowrap;
        }

        .track-item.playing .day-number-badge {
            background-color: #000000;
            color: #fde047;
        }

        .verse-ref {
            font-size: 0.68rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .track-item.playing .verse-ref {
            color: var(--raw-black);
        }

        .track-action-column {
            display: flex;
            flex-direction: column;
            align-items: end;
            gap: 6px;
            flex-shrink: 0;
            min-width: 60px;
            padding-top: 28px;
        }

        .track-duration-stamp {
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--text-muted);
            text-align: center;
            white-space: nowrap;
            letter-spacing: 0.2px;
        }

        .track-item.playing .track-duration-stamp {
            color: var(--raw-black);
        }

        .play-indicator {
            width: 36px;
            height: 36px;
            background-color: #ffffff;
            border: 2px solid var(--raw-black);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-indicator::after {
            content: "";
            width: 0;
            height: 0;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: 10px solid var(--raw-black);
            margin-left: 2px;
            display: block;
        }

        .track-item.playing .play-indicator::after {
            display: none;
        }

        /* Loading spinner */
        @keyframes spin { to { transform: rotate(360deg); } }

        .track-item.media-loading .play-indicator::after { display: none; }
        .track-item.media-loading .equalizer-wave { display: none !important; }
        .track-item.media-loading .pause-icon { display: none !important; }
        .track-item.media-loading .play-indicator::before {
            content: '';
            width: 16px;
            height: 16px;
            border: 2.5px solid #ccc;
            border-top-color: var(--raw-black);
            border-radius: 50%;
            display: block;
            animation: spin 0.7s linear infinite;
        }

        /* Pause icon: two vertical bars via element + box-shadow */
        .track-item.playing.media-paused .play-indicator::after {
            display: none;
        }

        .pause-icon {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            width: 100%;
            height: 100%;
        }

        .track-item.playing.media-paused .play-indicator .pause-icon {
            display: flex;
        }

        .pause-bar {
            width: 3px;
            height: 13px;
            background-color: var(--raw-black);
            display: inline-block;
        }

        .pause-bars {
            display: flex;
            gap: 5px;
            align-items: center;
            justify-content: center;
        }

        /* Hide equalizer when paused */
        .track-item.playing.media-paused .equalizer-wave {
            display: none;
        }

        .equalizer-wave {
            display: none;
            align-items: flex-end;
            justify-content: space-between;
            width: 16px;
            height: 16px;
        }

        .track-item.playing .equalizer-wave {
            display: flex;
        }

        .eq-bar {
            width: 3px;
            height: 100%;
            background-color: var(--raw-black);
            transform-origin: bottom;
            animation: bounceWave 0s ease-in-out infinite alternate;
        }

<script>
    // ─── CONFIG ──────────────────────────────────────────────────────────────────
    // Track titles are managed in:
    //   resources/audio/bible-teaching/tracks.js
    // Audio files are auto-discovered by title (.m4a preferred, .mp3 fallback).

    const AUDIO_BASE = 'resources/audio/bible-teaching/';

    // Resolve audio file path — .m4a preferred, .mp3 as fallback (handled at runtime)
    function getAudioFilePath(title) {
        return AUDIO_BASE + title + '.m4a';
    }

    function getAudioFilePathFallback(title) {
        return AUDIO_BASE + title + '.mp3';
    }
    // ─────────────────────────────────────────────────────────────────────────────

    const audio = document.getElementById('nativeAudio');
    const panel = document.getElementById('customPlayerPanel');
    const pill = document.getElementById('pillTrigger');
    const pillGroup = document.getElementById('pillGroup');
    const titleLabel = document.getElementById('playerTitleLabel');
    const dayLabel = document.getElementById('playerDayLabel');
    const playIconContainer = document.getElementById('playBtnIcon');
    const globalStopBtn = document.getElementById('headerStopBtn');
    const notesPillBtn  = document.getElementById('notesPillBtn');

    // ── Notes Sheet ────────────────────────────────────────────────────────────
    function findNoteForTitle(title) {
        if (typeof BIBLE_STUDY_NOTES === 'undefined') return null;
        const t = title.toLowerCase();
        return BIBLE_STUDY_NOTES.find(n => {

        }) || null;

    function updateTimelineProgress(current, duration) {
        const safeDuration = Number.isFinite(duration) && duration > 0 ? duration : 0;
        const safeCurrent = Number.isFinite(current) && current > 0 ? current : 0;
        const percent = safeDuration ? (safeCurrent / safeDuration) * 100 : 0;
        scrubFill.style.width = percent + '%';
        scrubHandle.style.left = percent + '%';
    }

    function processScrub(clientX) {
        if (!audio.src || !audio.duration) return;
        const rect = scrubArea.getBoundingClientRect();
        let offset = (clientX - rect.left) / rect.width;
        offset = Math.max(0, Math.min(1, offset));
        hasPlaybackCompleted = false;
        audio.currentTime = offset * audio.duration;
        updateTimelineProgress(audio.currentTime, audio.duration);
        timeCurrent.innerText = formatTime(audio.currentTime);

        if (offset >= 1) {
            handlePlaybackCompleted();
        } else {
            updatePlayButtonUI(!audio.paused);
        }
    }

    function handlePlaybackCompleted() {
        audio.pause();
        hasPlaybackCompleted = true;
        isCurrentlyPlaying = false;
        updateTimelineProgress(audio.duration, audio.duration);
        timeCurrent.innerText = formatTime(audio.duration);
        updatePlayButtonUI(false);
        panel.classList.add('visible');
        pillGroup.classList.remove('active');

        if (activeTrackElementId) {
            const targetCard = document.getElementById(activeTrackElementId);
            targetCard.classList.add('playing');
            targetCard.classList.remove('media-active', 'media-paused');
        }
    }

    function restartCompletedPlayback() {
        const targetCard = activeTrackElementId ? document.getElementById(activeTrackElementId) : null;

        hasPlaybackCompleted = false;
        isCurrentlyPlaying = true;
        audio.pause();
        audio.currentTime = 0;
        timeCurrent.innerText = '0:00';
        updateTimelineProgress(0, audio.duration);
        updatePlayButtonUI(true);

        if (targetCard) {
            targetCard.classList.add('playing', 'media-active');
            targetCard.classList.remove('media-paused');
        }

        const playAttempt = audio.play();
        if (playAttempt && typeof playAttempt.catch === 'function') {
            playAttempt.catch(() => {
                isCurrentlyPlaying = false;
                hasPlaybackCompleted = true;
                updatePlayButtonUI(false);
            });
        }
    }

    function executeTrackLoad(fileUrl, title, dayText, elementId) {
        document.querySelectorAll('.track-item').forEach(item => {
            item.classList.remove('playing', 'media-active', 'media-paused');
        });
        
        activeTrackElementId = elementId;
        const targetCard = document.getElementById(elementId);
        targetCard.classList.add('playing', 'media-active');

        titleLabel.innerHTML = title;
        dayLabel.innerText = "NOW PLAYING // " + dayText;
        
        audio.src = fileUrl;
        hasPlaybackCompleted = false;

        // Reset speed to 1.0x on every new track
        audio.playbackRate = 1.0;
        document.querySelectorAll('.speed-dropdown-item').forEach(b => b.classList.remove('active'));
        const defaultSpeedBtn = document.querySelector('.speed-dropdown-item[onclick="setSpeed(1.0, this)"]');
        if (defaultSpeedBtn) defaultSpeedBtn.classList.add('active');
        document.getElementById('speedToggleBtn').textContent = '1.0x \u25BE';
        
        pillGroup.classList.add('active');
        globalStopBtn.classList.add('active');

        // Show notes button only if this track has study notes
        const note = findNoteForTitle(title);
        if (note) {
            populateNotesSheet(note);
            notesPillBtn.style.display = 'flex';
        } else {
            notesPillBtn.style.display = 'none';
            document.getElementById('notesSheet').classList.add('hidden');
        }

        // Reset progress bar immediately before audio loads
        updateTimelineProgress(0, 0);
        timeCurrent.innerText = '0:00';
        timeDuration.innerText = '0:00';

        audio.load();
        audio.play();
        isCurrentlyPlaying = true;
        updatePlayButtonUI(true);

        // Show loading state on card
        targetCard.classList.add('media-loading');
        const clearLoading = () => {
            targetCard.classList.remove('media-loading');
            audio.removeEventListener('canplay', clearLoading);
            audio.removeEventListener('error', clearLoading);
        };
        audio.addEventListener('canplay', clearLoading);
        audio.addEventListener('error', clearLoading);

        // Fallback: if .m4a fails, retry with .mp3
        audio.onerror = () => {
            if (audio.src.endsWith('.m4a')) {
                audio.src = audio.src.replace('.m4a', '.mp3');
                audio.load();
                audio.play();
            }
        };
    }

    function togglePlayback() {

            if(targetCard) {
                targetCard.classList.remove('media-active');
                targetCard.classList.add('media-paused');
            }

    }

    function jumpAudio(seconds) {
        if (!audio.src) return;
        let targetTime = audio.currentTime + seconds;
        if (targetTime < 0) targetTime = 0;
        if (targetTime > audio.duration) targetTime = audio.duration;
        hasPlaybackCompleted = false;
        audio.currentTime = targetTime;

        if (audio.duration && targetTime >= audio.duration) {
            handlePlaybackCompleted();
        } else {
            updatePlayButtonUI(!audio.paused);
        }
    }

    function formatTime(secs) {
        if (isNaN(secs)) return "0:00";
        const m = Math.floor(secs / 60);
        const s = Math.floor(secs % 60);
        return m + ":" + (s < 10 ? "0" : "") + s;
    }

    audio.addEventListener('timeupdate', () => {
        timeCurrent.innerText = formatTime(audio.currentTime);

    audio.addEventListener('durationchange', () => {

    // ── Build playlist from BIBLE_TRACKS (no fetch — works on file:// too) ─────
    function getDuration(url) {
        return new Promise((resolve) => {
            const a = new Audio();
            let done = false;
            const finish = (dur) => { if (done) return; done = true; a.src = ''; resolve(dur); };
            a.addEventListener('loadedmetadata', () => finish(a.duration));
            a.addEventListener('error', () => finish(0));
            a.src = url;
            a.load();
            setTimeout(() => finish(0), 5000);
        });
    }

    function buildTrackCard(dayNum, filePath, title, trackId, duration, desc, verse, important, importantColor, cardBg, youtubeLink) {

            li.style.backgroundPosition = 'center';
        }
        li.id = trackId;

        let longPressTimer = null;
        let longPressTriggered = false;

        const clearLongPress = () => {
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
        };

        li.addEventListener('pointerdown', (e) => {
            if (e.pointerType === 'mouse' && e.button !== 0) return;
            longPressTriggered = false;
            clearLongPress();

            if (youtubeLink) {
                longPressTimer = setTimeout(() => {
                    longPressTriggered = true;
                    showYouTubeLinkModal(title, youtubeLink);
                }, LONG_PRESS_MS);
            }
        });

        li.addEventListener('pointerup', () => {
            clearLongPress();
        });

        li.addEventListener('pointerleave', clearLongPress);
        li.addEventListener('pointercancel', clearLongPress);

        li.addEventListener('click', () => {
            if (longPressTriggered) {
                longPressTriggered = false;
                return;

    async function discoverAndBuildPlaylist() {
        const container = document.getElementById('playlistContainer');

        const msg = document.getElementById('loadingMsg');
        if (msg) msg.remove();

        for (const track of BIBLE_TRACKS) {
            container.appendChild(buildSkeleton('track' + track.day));
        }

        // Use pre-set durations from tracks.js when available — no file reading needed.
        // Always wait at least 1s so skeletons are visible.
        const minDelay = new Promise(resolve => setTimeout(resolve, 1000));
        const durations = await Promise.all(
            BIBLE_TRACKS.map(track =>
                track.duration != null
                    ? Promise.resolve(track.duration)
                    : getDuration(getAudioFilePath(track.file || track.title))
            )
        );
        await minDelay;

        // Swap each skeleton with the real card
        BIBLE_TRACKS.forEach((track, i) => {
            const skelEl = document.getElementById('skel-track' + track.day);
            const card = buildTrackCard(track.day, getAudioFilePath(track.file || track.title), track.title, 'track' + track.day, durations[i], track.desc, track.verse, track.important, track.importantColor, track.cardBg, track.youtubeLink);
            card.dataset.category = track.category || '';
            card.dataset.day = track.day;
            skelEl.replaceWith(card);
        });

        // ── Build folder chips from BIBLE_FOLDERS ──────────────────────────
        const chipsContainer = document.getElementById('folderChips');
        (typeof BIBLE_FOLDERS !== 'undefined' ? BIBLE_FOLDERS : [{ name: 'All Items', type: 'all' }]).forEach((folder, idx) => {
            const chip = document.createElement('div');
            chip.className = 'small-folder-chip' + (idx === 0 ? ' active' : '');
            chip.textContent = '\uD83D\uDCC1 ' + folder.name;
            chip.dataset.folderIdx = idx;
            chip.addEventListener('click', () => {
                document.querySelectorAll('.small-folder-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                document.querySelectorAll('.track-item').forEach(cardEl => {
                    let show = false;
                    if (folder.type === 'all') {
                        show = true;
                    } else if (folder.type === 'category') {
                        const categories = (cardEl.dataset.category || '')
                            .split(',')
                            .map(c => c.trim())
                            .filter(Boolean);
                        show = categories.includes(folder.value);
                    } else if (folder.type === 'days') {
                        show = folder.value.includes(Number(cardEl.dataset.day));
                    }
                    cardEl.style.display = show ? '' : 'none';
                });
            });
            chipsContainer.appendChild(chip);
        });
    }

    // ── Password Gate (Keypad) ─────────────────────────────────────────────────
    const CORRECT_HASH = '007ac4200b49a365708b5c1032ebda275ceb56a5c1114751da2c1ffd707ed689'; // SHA-256 of 666999
    let pinValue = '';
    const PIN_LENGTH = 6;

    function updatePinDots() {
        for (let i = 0; i < PIN_LENGTH; i++) {
            const dot = document.getElementById('dot' + i);
            dot.classList.toggle('filled', i < pinValue.length);
        }
    }

    function keyPress(num) {
        if (pinValue.length >= PIN_LENGTH) return;
        pinValue += num;
        updatePinDots();
        // Auto-submit when all dots filled
        if (pinValue.length === PIN_LENGTH) {
            setTimeout(() => unlockPage(), 150);
        }
    }

    function keyDel() {
        pinValue = pinValue.slice(0, -1);
        updatePinDots();
    }

    async function sha256(str) {
        const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function unlockPage() {
        const hash = await sha256(pinValue);
        if (hash === CORRECT_HASH) {
            sessionStorage.setItem('bible_audio_unlocked', '1');
            document.getElementById('passwordGate').classList.add('hidden');
            discoverAndBuildPlaylist();
        } else {
            const err = document.getElementById('gateError');
            err.classList.add('visible');
            // Shake the pin display
            const display = document.getElementById('pinDisplay');
            display.style.animation = 'none';
            display.style.borderColor = '#ef4444';
            pinValue = '';
            updatePinDots();
            setTimeout(() => {
                err.classList.remove('visible');
                display.style.borderColor = '#000000';
            }, 2000);
        }
    }

    // Skip gate if already unlocked this session
    if (sessionStorage.getItem('bible_audio_unlocked') === '1') {
        document.getElementById('passwordGate').classList.add('hidden');
        discoverAndBuildPlaylist();
    }

    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('copy', e => e.preventDefault());
    document.addEventListener('selectstart', e => e.preventDefault());

    // Disable Ctrl+scroll zoom and Ctrl +/- keyboard zoom
    document.addEventListener('wheel', e => { if (e.ctrlKey) e.preventDefault(); }, { passive: false });
    document.addEventListener('keydown', e => {
        if (e.ctrlKey && (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0')) {
            e.preventDefault();
        }
    });
    // Disable pinch-to-zoom on touch devices
    document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturestart', e => e.preventDefault());

    // ── Swipe-right to go back ─────────────────────────────────────────────────
    let swipeStartX = 0;
    let swipeStartY = 0;
    document.addEventListener('touchstart', e => {
        swipeStartX = e.touches[0].clientX;
        swipeStartY = e.touches[0].clientY;
    }, { passive: true });
    document.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - swipeStartX;
        const dy = Math.abs(e.changedTouches[0].clientY - swipeStartY);
        // Swipe right: > 80px horizontal, starting from left edge (< 40px), and mostly horizontal
        if (dx > 80 && dy < 60 && swipeStartX < 40) {
            window.location.href = 'index.html';
        }
    }, { passive: true });

    // ── Scroll to top on page load ─────────────────────────────────────────────
    window.addEventListener('load', () => {
        window.scrollTo(0, 0);
    });
</script>
