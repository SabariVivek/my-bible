<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Characters</title>
    <style>
        body { font-family: ui-sans-serif, system-ui, sans-serif; background-color: #f3f4f6; padding: 40px 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* Using the nb-phase style for the header */
        .nb-phase {
            display: inline-block;
            background: #000000;
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: capitalize;
            padding: 8px 16px;
            transform: rotate(-1deg);
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }
        
        .character-list { display: flex; flex-direction: column; gap: 20px; }
        .char-card { 
            background: #ffffff; border: 3px solid #000000; border-radius: 4px; padding: 20px; 
            box-shadow: 6px 6px 0px #000000; text-decoration: none; color: #000; display: block;
            transition: all 0.2s;
        }
        .char-card:hover { transform: translate(-2px, -2px); box-shadow: 10px 10px 0px #000000; }
        
        .name-wrapper { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .char-name { font-size: 1.2rem; font-weight: 900; }
        
        .nt-tag { 
            font-size: 0.5rem; font-weight: 900; color: #ef4444; 
            border: 1px solid #ef4444; padding: 1px 3px; border-radius: 2px;
            vertical-align: middle;
        }
        
        .char-info { font-size: 0.9rem; color: #374151; }
    </style>
</head>
<body>

    <div class="container">
        <span class="nb-phase">Bible Characters</span>
        
        <div class="character-list">
            <a href="../resources/characters/Elijah.html" class="char-card">
                <div class="name-wrapper">
                    <span class="char-name">Elijah</span>
                    <span class="nt-tag">NT</span>
                </div>
                <span class="char-info">A bold prophet who confronted idolatry and witnessed the power of the living God.</span>
            </a>
        </div>
    </div>

</body>
</html>
