    <script>
        // Force cache refresh for updated reading plan
        const APP_VERSION = '20251126003722';
        const STORED_VERSION = localStorage.getItem('bibleAppVersion');
        if (STORED_VERSION !== APP_VERSION) {
            localStorage.setItem('bibleAppVersion', APP_VERSION);
            if ('caches' in window) {
                caches.keys().then(names => {
                    names.forEach(name => caches.delete(name));
                });
            }
            // Reload without cache
            if (STORED_VERSION) {
                window.location.reload(true);
            }
        }
        
        // Apply dark theme class immediately before DOM renders
        const isDarkTheme = localStorage.getItem('readingTrackerTheme') === 'dark' || !localStorage.getItem('readingTrackerTheme');
        if (isDarkTheme) {
            document.documentElement.classList.add('dark-theme');
        }
        
        // Set initial theme color for Android notification bar
        document.addEventListener('DOMContentLoaded', function() {
            const metaThemeColor = document.getElementById('theme-color-meta');
            if (metaThemeColor) {
                metaThemeColor.setAttribute('content', isDarkTheme ? '#21252b' : '#ffffff');
            }
            
            // Prevent context menu on images
            document.addEventListener('contextmenu', function(e) {
                if (e.target.tagName === 'IMG') {
                    e.preventDefault();
                }
            }, false);

            // Initialize quiz questions from Supabase
            if (typeof initializeQuizQuestions === 'function') {
                initializeQuizQuestions().then(quizData => {
                    window.quizQuestions = quizData;
                    console.log('Quiz questions loaded from Supabase:', Object.keys(quizData));
                    console.log('Ruth available:', !!quizData['ruth'], 'Titus available:', !!quizData['titus']);
                }).catch(error => {
                    console.warn('Failed to load quiz from Supabase, using local data:', error);
                    // Falls back to local window.quizQuestions already loaded
                });
            }
        });
    </script>

<body>
    <div id="app"></div>
    
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="book-loader"></div>
            <div class="loading-text">Loading...</div>
        </div>
    </div>

    <script>
        // Loading functions
        function showLoading(message = 'Loading...') {
            const overlay = document.getElementById('loadingOverlay');
            const text = overlay.querySelector('.loading-text');
            if (text) text.textContent = message;
            overlay.classList.add('show');
        }

        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.remove('show');
        }

        // Theme toggle function
        async function toggleTheme(event) {
            const clickedButton = event?.currentTarget || document.querySelector('button[onclick*="toggleTheme"]');
            
            // Check if View Transition API is supported and user doesn't prefer reduced motion
            if (
                !document.startViewTransition ||
                window.matchMedia('(prefers-reduced-motion: reduce)').matches
            ) {
                // Fallback: toggle without animation
                document.documentElement.classList.toggle('dark-theme');
                const isDark = document.documentElement.classList.contains('dark-theme');
                localStorage.setItem('readingTrackerTheme', isDark ? 'dark' : 'light');
                state.darkMode = isDark;
                
                // Update Android notification bar color
                const metaThemeColor = document.getElementById('theme-color-meta');
                if (metaThemeColor) {
                    metaThemeColor.setAttribute('content', isDark ? '#1e293b' : '#ffffff');
                }
                
                // Re-render entire page to apply theme to all sections
                render();
                return;
            }
            
            // Start view transition
            const transition = document.startViewTransition(() => {
                document.documentElement.classList.toggle('dark-theme');
                const isDark = document.documentElement.classList.contains('dark-theme');
                localStorage.setItem('readingTrackerTheme', isDark ? 'dark' : 'light');
                state.darkMode = isDark;
                
                // Update Android notification bar color
                const metaThemeColor = document.getElementById('theme-color-meta');
                if (metaThemeColor) {
                    metaThemeColor.setAttribute('content', isDark ? '#1e293b' : '#ffffff');
                }
                
                // Re-render entire page to apply theme to all sections
                render();
            });
            
            // Wait for transition to be ready
            await transition.ready;
            
            // Animate from right to left
            document.documentElement.animate(
                {
                    clipPath: [
                        'inset(0 0 0 100%)',
                        'inset(0 0 0 0%)'
                    ]
                },
                {
                    duration: 500,
                    easing: 'ease-in-out',
                    pseudoElement: '::view-transition-new(root)'
                }
            );
        }
        
        // Lightweight re-render for theme changes (no statistics loading)
        function renderDashboardOnly() {
            const app = document.getElementById('app');
            if (state.showAdminView) {
                app.innerHTML = renderProfileManagement();
            } else if (!state.currentUser) {
                app.innerHTML = renderUserSelection();
                if (state.showUserModal) {
                    setTimeout(() => {
                        const input = document.getElementById('newUserName');
                        if (input) input.focus();
                    }, 100);
                }
            } else if (state.showDashboard) {
                app.innerHTML = renderDashboard();
            }
        }

        // Custom Modal Functions
        function showCustomModal(options) {
            state.customModal = options;
            render();
        }

        function closeCustomModal() {
            state.customModal = null;
            render();
        }

        function confirmCustomModal() {
            if (state.customModal && state.customModal.onConfirm) {
                state.customModal.onConfirm();
            }
            closeCustomModal();
        }

        function renderCustomModal() {
            if (!state.customModal) return '';
            
            const { type, title, message, confirmText, cancelText } = state.customModal;
            const isDanger = type === 'danger';
            
            return `
                <div class="custom-modal-backdrop show" onclick="if(event.target === this) closeCustomModal()">
                    <div class="custom-modal">
                        <div class="custom-modal-title">${title}</div>
                        <div class="custom-modal-message">${message}</div>
                        <div class="custom-modal-actions">
                            <button class="custom-modal-btn custom-modal-btn-cancel" onclick="closeCustomModal()">
                                ${cancelText || 'Cancel'}
                            </button>
                            <button class="custom-modal-btn custom-modal-btn-confirm ${isDanger ? 'danger' : ''}" onclick="confirmCustomModal()">
                                ${confirmText || 'Confirm'}
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderUserModal() {
            const theme = state.darkMode ? {
                card: 'bg-slate-800',
                text: 'text-gray-100',
                border: 'border-slate-700'
            } : {
                card: 'bg-white',
                text: 'text-gray-900',
                border: 'border-gray-300'
            };
            
            return `
                <div class="user-modal-backdrop fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50" onclick="if(event.target === this) { state.showUserModal = false; state.userModalError = ''; render(); }">
                    <div class="${theme.card} rounded-2xl p-6 max-w-md w-full">
                        <h2 class="text-2xl font-bold mb-4">Add Family Member</h2>
                        <div class="mb-4">
                            <input id="newUserName" type="text" placeholder="Enter name" class="w-full ${theme.card} ${theme.text} border ${state.userModalError ? 'border-red-500' : theme.border} rounded-lg px-4 py-3 outline-none focus:ring-2 ${state.userModalError ? 'focus:ring-red-500' : 'focus:ring-blue-500'}" onkeypress="if(event.key === 'Enter') handleAddUser()" autofocus />
                            ${state.userModalError ? `<p class="text-red-500 text-xs mt-1">${state.userModalError}</p>` : ''}
                        </div>
                        <div class="flex gap-3">
                            <button onclick="state.showUserModal = false; state.userModalError = ''; render();" class="flex-1 ${theme.card} border ${theme.border} rounded-lg py-3 font-semibold">
                                Cancel
                            </button>
                            <button onclick="handleAddUser()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white rounded-lg py-3 font-semibold transition-colors">
                                Add
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // Long press handler for reading plan
        let readingPlanPressTimer = null;
        let readingPlanTouchStart = { x: 0, y: 0 };
        
        function handleReadingPlanPress(event) {
            if (event.type === 'touchstart') {
                readingPlanTouchStart.x = event.touches[0].clientX;
                readingPlanTouchStart.y = event.touches[0].clientY;
            }
            
            readingPlanPressTimer = setTimeout(() => {
                openReadingPlanSheet();
                readingPlanPressTimer = null;
            }, 2000); // 2 seconds
        }

        function handleReadingPlanRelease(event) {
            // Check if this was a scroll (movement > 10px)
            if (event.type === 'touchend' && readingPlanTouchStart) {
                const moveX = Math.abs(event.changedTouches[0].clientX - readingPlanTouchStart.x);
                const moveY = Math.abs(event.changedTouches[0].clientY - readingPlanTouchStart.y);
                
                // If user moved more than 10px, it's a scroll, not a long press
                if (moveX > 10 || moveY > 10) {
                    if (readingPlanPressTimer) {
                        clearTimeout(readingPlanPressTimer);
                        readingPlanPressTimer = null;
                    }
                }
            } else {
                // Clear timer if released before 2 seconds (for mouse)
                if (readingPlanPressTimer) {
                    clearTimeout(readingPlanPressTimer);
                    readingPlanPressTimer = null;
                }
            }
        }

        // Reading Plan Bottom Sheet Functions
        function openReadingPlanSheet() {
            const backdrop = document.getElementById('readingPlanBackdrop');
            const sheet = document.getElementById('readingPlanSheet');

            if (!backdrop || !sheet) return;

            const contentDiv = document.getElementById('readingPlanContent');
            if (!contentDiv) return;

            try {
                contentDiv.innerHTML = generateReadingPlanContent();
            } catch (error) {
                contentDiv.innerHTML = `<div style="padding: 20px; color: red;">Error loading reading plan: ${error.message}</div>`;
            }

            backdrop.classList.add('show');
            sheet.classList.add('show');
            document.body.style.overflow = 'hidden';

            // Push history state so back button closes the sheet
            window.history.pushState({ readingPlanSheet: true }, '');

            // Scroll to today's entry
            requestAnimationFrame(() => {
                const todayEl = contentDiv.querySelector('.rp-day-today');
                if (todayEl) {
                    todayEl.scrollIntoView({ block: 'center', behavior: 'smooth' });
                }
            });
        }

        function closeReadingPlanSheet(fromPopState) {
            const backdrop = document.getElementById('readingPlanBackdrop');
            const sheet = document.getElementById('readingPlanSheet');
            
            if (!backdrop || !sheet) return;
            if (!sheet.classList.contains('show')) return;
            
            backdrop.classList.remove('show');
            sheet.classList.remove('show');
            document.body.style.overflow = '';

            // If not triggered by popstate, pop the history entry we pushed.
            // Use a flag to prevent the popstate handler from cascading.
            if (!fromPopState) {
                window._closingReadingPlan = true;
                window.history.back();
            }
        }

        function generateReadingPlanContent() {
            if (typeof yearlyReadingPlan === 'undefined') {
                return '<div style="padding: 20px; color: red;">Error: Reading plan data not loaded</div>';
            }

            const currentYear = new Date().getFullYear();
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const isDark = state.darkMode;
            const completedDates = (state.currentUser && state.currentUser.completedDates) || {};

            // Group by month
            const months = {};
            let totalCompleted = 0;
            let totalDays = 0;

            yearlyReadingPlan.forEach(day => {
                const isLeapYear = (currentYear % 4 === 0 && currentYear % 100 !== 0) || (currentYear % 400 === 0);
                if (day.leapYearOnly && !isLeapYear) return;
                const mk = day.month;
                if (!months[mk]) months[mk] = [];
                const date = new Date(currentYear, day.month - 1, day.day);
                date.setHours(0, 0, 0, 0);
                const dateKey = `${currentYear}-${String(day.month).padStart(2, '0')}-${String(day.day).padStart(2, '0')}`;
                const isCompleted = !!completedDates[dateKey];
                const isPast = date <= today;
                const isToday = date.getTime() === today.getTime();
                const status = isCompleted ? 'done' : (isPast ? 'missed' : 'future');
                if (isCompleted) totalCompleted++;
                totalDays++;
                months[mk].push({ day: day.day, month: day.month, portions: day.portions, date, dateKey, status, isToday });
            });

            const overallPct = Math.round((totalCompleted / totalDays) * 100);

            // Summary header
            let html = `
            <div class="rp-summary">
                <div class="rp-summary-ring">
                    <svg viewBox="0 0 36 36" class="rp-ring-svg">
                        <path class="rp-ring-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                        <path class="rp-ring-fill" stroke-dasharray="${overallPct}, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                    </svg>
                    <span class="rp-ring-text">${overallPct}%</span>
                </div>
                <div class="rp-summary-info">
                    <div class="rp-summary-title">${totalCompleted} of ${totalDays} days</div>
                    <div class="rp-summary-sub">completed so far</div>
                </div>
                <div class="rp-legend">
                    <span class="rp-legend-item"><span class="rp-dot rp-dot-done"></span>Done</span>
                    <span class="rp-legend-item"><span class="rp-dot rp-dot-missed"></span>Missed</span>
                    <span class="rp-legend-item"><span class="rp-dot rp-dot-future"></span>Upcoming</span>
                </div>
            </div>`;

            // Month sections
            Object.entries(months).forEach(([monthNum, days]) => {
                const monthName = new Date(currentYear, parseInt(monthNum) - 1).toLocaleDateString('en-US', { month: 'long' });
                const mDone = days.filter(d => d.status === 'done').length;
                const mPct = Math.round((mDone / days.length) * 100);

                html += `
                <div class="rp-month">
                    <div class="rp-month-head">
                        <div class="rp-month-name">${monthName}</div>
                        <div class="rp-month-stat">
                            <div class="rp-month-bar"><div class="rp-month-bar-fill" style="width:${mPct}%"></div></div>
                            <span class="rp-month-count">${mDone}/${days.length}</span>
                        </div>
                    </div>
                    <div class="rp-days">
                        ${days.map(d => {
                            const label = d.date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                            const books = d.portions.map(p => `<span class="rp-book">${p.book} ${p.chapters}</span>`).join('');
                            const todayTag = d.isToday ? '<span class="rp-today-tag">Today</span>' : '';
                            return `
                            <div class="rp-day rp-day-${d.status} ${d.isToday ? 'rp-day-today' : ''}" onclick="selectDateAndNavigate(${currentYear}, ${d.month}, ${d.day})">
                                <div class="rp-day-indicator">
                                    <div class="rp-day-dot">${d.status === 'done' ? '✓' : d.status === 'missed' ? '!' : ''}</div>
                                    <div class="rp-day-line"></div>
                                </div>
                                <div class="rp-day-card">
                                    <div class="rp-day-top">
                                        <span class="rp-day-label">${label}</span>
                                        ${todayTag}
                                    </div>
                                    <div class="rp-day-books">${books}</div>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
            });

            return html;
        }

        function selectDateAndNavigate(year, month, day) {
            console.log(`Navigating to ${year}-${month}-${day}`);
            // Close the bottom sheet
            closeReadingPlanSheet();
            
            // Set the selected date
            state.selectedDate = new Date(year, month - 1, day);
            
            // Navigate away from dashboard
            state.showDashboard = false;
            
            // Reload data for this date
            loadCompletedPortionsForDate();
            
            // Re-render to show the selected date's reading
            render();
        }

        // Swipe Gesture Handling
        let touchStartX = 0;
        let touchEndX = 0;
        const minSwipeDistance = 50;
        let dashboardDate = new Date(); // Track date for dashboard reading card
        let completedPortions = new Set(); // Track individual completed portions for current date

        function handleSwipeGesture() {
            const swipeDistance = touchEndX - touchStartX;
            if (Math.abs(swipeDistance) < minSwipeDistance) return;

            const cardWrapper = document.querySelector('.reading-card-wrapper');
            if (!cardWrapper) return;

            if (swipeDistance > 0) {
                cardWrapper.classList.add('swipe-right');
                setTimeout(async () => {
                    const newDate = new Date(state.selectedDate);
                    newDate.setDate(newDate.getDate() - 1);
                    state.selectedDate = newDate;
                    await loadCompletedPortionsForDate();
                    saveData();
                    render();
                }, 300);
            } else {
                cardWrapper.classList.add('swipe-left');
                setTimeout(async () => {
                    const newDate = new Date(state.selectedDate);
                    newDate.setDate(newDate.getDate() + 1);
                    state.selectedDate = newDate;
                    await loadCompletedPortionsForDate();
                    saveData();
                    render();
                }, 300);
            }
        }

        function initSwipeListeners() {
            const readingCard = document.getElementById('dailyReadingCard');
            if (!readingCard) return;

            readingCard.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });

            readingCard.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipeGesture();
            }, { passive: true });
        }

        // Navigation functions for Previous/Next buttons
        async function navigateToPreviousDate() {
            const newDate = new Date(state.selectedDate);
            newDate.setDate(newDate.getDate() - 1);
            state.selectedDate = newDate;
            
            // Reload completed dates and portions
            if (state.currentUser) {
                try {
                    const savedDates = await BibleReadingDB.getCompletedDates(state.currentUser.id);
                    state.currentUser.completedDates = {};
                    savedDates.forEach(dateStr => {
                        const [year, month, day] = dateStr.split('-').map(Number);
                        const key = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                        state.currentUser.completedDates[key] = true;
                    });
                } catch (error) {
                    console.error('Error loading completed dates:', error);
                }
            }
            
            await loadCompletedPortionsForDate();
            saveData();
            render();
        }

        async function navigateToNextDate() {
            const newDate = new Date(state.selectedDate);
            newDate.setDate(newDate.getDate() + 1);
            state.selectedDate = newDate;
            
            // Reload completed dates and portions
            if (state.currentUser) {
                try {
                    const savedDates = await BibleReadingDB.getCompletedDates(state.currentUser.id);
                    state.currentUser.completedDates = {};
                    savedDates.forEach(dateStr => {
                        const [year, month, day] = dateStr.split('-').map(Number);
                        const key = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                        state.currentUser.completedDates[key] = true;
                    });
                } catch (error) {
                    console.error('Error loading completed dates:', error);
                }
            }
            
            await loadCompletedPortionsForDate();
            saveData();
            render();
        }

        function handleDashboardSwipeGesture() {
            const swipeDistance = touchEndX - touchStartX;
            if (Math.abs(swipeDistance) < minSwipeDistance) return;

            const cardWrapper = document.querySelector('.dashboard-reading-card-wrapper');
            if (!cardWrapper) return;

            if (swipeDistance > 0) {
                cardWrapper.classList.add('swipe-right');
                setTimeout(() => {
                    dashboardDate.setDate(dashboardDate.getDate() - 1);
                    render();
                }, 300);
            } else {
                cardWrapper.classList.add('swipe-left');
                setTimeout(() => {
                    dashboardDate.setDate(dashboardDate.getDate() + 1);
                    render();
                }, 300);
            }
        }

        function initDashboardSwipeListeners() {
            const readingCard = document.getElementById('dashboardReadingCard');
            if (!readingCard) return;

            readingCard.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });

            readingCard.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                handleDashboardSwipeGesture();
            }, { passive: true });
        }

        function handleQuizSwipeGesture() {
            const container = document.getElementById('quizContainer');
            if (!container) return;

            // Disabled: Left swipe navigation on quiz pages
            // Only Android system back button or back button click should work
            return;
        }

        function initDashboardTabSwipeListeners() {
            // Swipe navigation removed
        }

        async function togglePortionComplete(portionIndex) {
            console.log('togglePortionComplete called with portionIndex:', portionIndex);
            console.log('state.selectedDate:', state.selectedDate);
            console.log('state.selectedDate.toDateString():', state.selectedDate.toDateString());
            console.log('Year:', state.selectedDate.getFullYear(), 'Month:', state.selectedDate.getMonth() + 1, 'Date:', state.selectedDate.getDate());
            console.log('state.currentUser:', state.currentUser);
            console.log('state.isInitializing:', state.isInitializing);
            
            if (!state.currentUser) {
                console.log('No current user');
                return;
            }
            
            // Prevent clicking during page load
            if (state.isInitializing) {
                alert('Page is still loading, please wait...');
                return;
            }
            
            const dateKey = `${state.selectedDate.getFullYear()}-${String(state.selectedDate.getMonth() + 1).padStart(2, '0')}-${String(state.selectedDate.getDate()).padStart(2, '0')}`;
            const portionKey = `${dateKey}-${portionIndex}`;
            
            console.log('dateKey:', dateKey);
            console.log('portionKey:', portionKey);
            console.log('completedPortions before:', completedPortions);
            
            try {
                if (completedPortions.has(portionKey)) {
                    console.log('Unmarking portion as completed');
                    completedPortions.delete(portionKey);

        function parseChapterRange(chaptersStr) {
            const chapters = [];
            const parts = chaptersStr.split(',');

            parts.forEach(part => {
                part = part.trim();
                
                // Handle verse ranges like "119:41-80" - extract just the chapter number
                if (part.includes(':')) {
                    const chapterNum = parseInt(part.split(':')[0]);
                    if (!chapters.includes(chapterNum)) {
                        chapters.push(chapterNum);
                    }
                } else if (part.includes('-')) {
                    const [start, end] = part.split('-').map(n => parseInt(n.trim()));
                    for (let i = start; i <= end; i++) {
                        chapters.push(i);
                    }
                } else {
                    chapters.push(parseInt(part));
                }
            });

            return chapters;
        }

            return otBook ? otBook.name : (ntBook ? ntBook.name : null);
        }

            const dateKey = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            const hasReadToday = user.completedDates && user.completedDates[dateKey];
            
            // Calculate last read date
            let lastReadDate = null;
            let daysPending = 0;
            
            // Calculate pending days from Jan 1 of current year
            const startOfYear = new Date(today.getFullYear(), 0, 1);
            const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate());
            const totalDaysSinceJan1 = Math.floor((todayStart - startOfYear) / (1000 * 60 * 60 * 24)) + 1;
            
            // Count completed days in current year
            let completedDaysCount = 0;
            if (user.completedDates) {
                completedDaysCount = Object.keys(user.completedDates).filter(d => {
                    const [y, m, day] = d.split('-').map(Number);
                    return y === today.getFullYear();
                }).length;
                
                // Get last read date
                const dates = Object.keys(user.completedDates).map(d => {
                    const [y, m, day] = d.split('-').map(Number);
                    return new Date(y, m - 1, day);
                }).sort((a, b) => b - a);
                
                if (dates.length > 0) {
                    lastReadDate = dates[0];
                }
            }
            
            // Days pending = total days from Jan 1 to today - completed days
            daysPending = totalDaysSinceJan1 - completedDaysCount;
            if (daysPending < 0) daysPending = 0;
            
            // Calculate total chapters read
            // Use readChaptersCount if loaded from dashboard, otherwise calculate from progress
            let totalChaptersRead = 0;
            if (user.readChaptersCount !== undefined) {
                // Use the preloaded count from dashboard
                totalChaptersRead = user.readChaptersCount;
            } else if (user.progress) {
                // Fallback to counting from progress object
                const progressKeys = Object.keys(user.progress).filter(k => user.progress[k] === 'read');
                totalChaptersRead = progressKeys.length;
            }
            
            const totalProgress = (totalChaptersRead / 1189) * 100;
            
            return {
                hasReadToday,
                lastReadDate,
                daysPending,
                chaptersRead: totalChaptersRead,
                totalProgress: totalProgress
            };
        }

        // Calculate timeline-based progress independent of actual reading
        function calculateTimelineProgress() {
            const today = new Date();
            const currentYear = today.getFullYear();
            const startOfYear = new Date(currentYear, 0, 1);
            
            // Calculate what day of the year we're on (1-365/366)
            const timeDiff = today - startOfYear;
            const dayOfYear = Math.floor(timeDiff / (1000 * 60 * 60 * 24)) + 1;
            
            // Get all days in the reading plan up to and including today
            const readingDaysUpToToday = yearlyReadingPlan.filter(entry => {
                if (entry.month < today.getMonth() + 1) return true;
                if (entry.month === today.getMonth() + 1 && entry.day <= today.getDate()) return true;
                return false;
            });
            
            // Calculate chapters scheduled by today's date
            let chaptersScheduledByToday = 0;
            let otChaptersScheduled = 0;
            let ntChaptersScheduled = 0;
            const booksWithChapters = new Map();
            
            readingDaysUpToToday.forEach(entry => {
                entry.portions.forEach(portion => {
                    const bookName = normalizeBookName(portion.book);
                    const chapterRanges = parseChapterRange(portion.chapters);
                    
                    if (!booksWithChapters.has(bookName)) {
                        booksWithChapters.set(bookName, new Set());
                    }
                    
                    const bookChapters = booksWithChapters.get(bookName);
                    chapterRanges.forEach(ch => {
                        bookChapters.add(ch);
                        
                        // Count OT vs NT
                        const isOT = oldTestamentBooks.some(b => b.name === bookName);
                        if (isOT) {
                            otChaptersScheduled++;
                        } else {
                            ntChaptersScheduled++;
                        }
                    });
                });
            });
            
            // Count unique chapters scheduled
            booksWithChapters.forEach((chapters, bookName) => {
                chaptersScheduledByToday += chapters.size;
            });
            
            // Total chapters in Bible = 1189
            const totalChaptersInBible = 1189;
            const percentage = Math.round((chaptersScheduledByToday / totalChaptersInBible) * 100);
            
            return {
                chaptersScheduled: chaptersScheduledByToday,
                totalChapters: totalChaptersInBible,
                otChapters: otChaptersScheduled,
                ntChapters: ntChaptersScheduled,
                percentage: Math.min(percentage, 100),
                dayOfYear: dayOfYear
            };
        }

        async function submitQuiz(questions, dateKey, chapter) {
            try {
                // Check if user has already completed this chapter
                const bookName = state.selectedQuizBook;
                const isAlreadyCompleted = Object.keys(state.completedQuizChapters).some(date => 
                    state.completedQuizChapters[date]?.[state.currentUser.id]?.[bookName]?.[chapter]
                );
                
                if (isAlreadyCompleted) {
                    alert('This chapter has already been completed. No retakes are allowed.');
                    return;
                }
                
                // Get all form inputs and calculate score
                const form = document.getElementById('quizForm');
                const formData = new FormData(form);
                let score = 0;
                const userAnswers = {};

                questions.forEach(q => {
                    const answer = formData.get(`q${q.id}`);
                    userAnswers[q.id] = answer;
                    if (answer !== null && parseInt(answer) === q.correctAnswer) {
                        score++;
                    }
                });

                // Get currently selected user from state
                if (!state.currentUser) throw new Error('No user selected');
                const selectedUserName = state.currentUser.name;
                
                // Mark chapter as completed (per-user, per-book tracking)
                if (!state.completedQuizChapters[dateKey]) {
                    state.completedQuizChapters[dateKey] = {};
                }
                if (!state.completedQuizChapters[dateKey][state.currentUser.id]) {
                    state.completedQuizChapters[dateKey][state.currentUser.id] = {};
                }
                if (!state.completedQuizChapters[dateKey][state.currentUser.id][bookName]) {
                    state.completedQuizChapters[dateKey][state.currentUser.id][bookName] = {};
                }
                state.completedQuizChapters[dateKey][state.currentUser.id][bookName][chapter] = true;
                
                // Store chapter score (per-user, per-book)
                if (!state.chapterScores[dateKey]) {
                    state.chapterScores[dateKey] = {};
                }
                if (!state.chapterScores[dateKey][state.currentUser.id]) {
                    state.chapterScores[dateKey][state.currentUser.id] = {};
                }
                if (!state.chapterScores[dateKey][state.currentUser.id][bookName]) {
                    state.chapterScores[dateKey][state.currentUser.id][bookName] = {};
                }
                state.chapterScores[dateKey][state.currentUser.id][bookName][chapter] = score;

                // Store in state
                state.quizSubmitted[dateKey] = {
                    score: score,
                    totalQuestions: questions.length
                };

                // Update user's quiz score in local state (use auth user's name)
                const userIndex = state.users.findIndex(u => u.name === selectedUserName);
                if (userIndex !== -1) {
                    if (!state.users[userIndex].quizScores) {
                        state.users[userIndex].quizScores = {};
                    }
                    state.users[userIndex].quizScores[dateKey] = {
                        score: score,
                        totalQuestions: questions.length
                    };
                }

                // Build local leaderboard from all users' scores - calculate from all completed chapters
                state.quizLeaderboard = state.users
                    .map(user => {
                        // Calculate total score from all chapters completed today by this user
                        let totalScore = 0;
                        let totalQuestions = 0;
                        
                        if (state.chapterScores[dateKey] && state.chapterScores[dateKey][user.id]) {
                            const userChapters = state.chapterScores[dateKey][user.id];
                            // Iterate through all books
                            Object.keys(userChapters).forEach(book => {
                                // Iterate through all chapters in each book
                                Object.keys(userChapters[book]).forEach(chapter => {
                                    totalScore += userChapters[book][chapter] || 0;
                                });
                            });
                        }
                        
                        // Also count total questions from completed chapters
                        if (state.completedQuizChapters[dateKey] && state.completedQuizChapters[dateKey][user.id]) {
                            const userCompletedChapters = state.completedQuizChapters[dateKey][user.id];
                            // Count the number of completed chapters
                            Object.keys(userCompletedChapters).forEach(book => {
                                Object.keys(userCompletedChapters[book]).forEach(chapter => {
                                    if (userCompletedChapters[book][chapter]) {
                                        // Estimate 10 questions per chapter (standard)
                                        totalQuestions += 10;
                                    }
                                });
                            });
                        }
                        
                        return {
                            name: user.name,
                            score: totalScore,
                            total_questions: totalQuestions
                        };
                    })
                    .filter(entry => entry.score > 0)
                    .sort((a, b) => b.score - a.score)
                    .map((entry, idx) => ({ ...entry, rank: idx + 1 }));

                // Trigger confetti when user completes a quiz
                setTimeout(() => {
                    createConfetti();
                }, 500);

                // Save to Supabase (non-blocking) - one row per chapter
                if (state.currentUser && state.currentUser.id) {
                    try {
                        // Save individual chapter result to new quiz_chapter_results table
                        const chapterResultData = {
                            user_id: state.currentUser.id,
                            quiz_date: dateKey,
                            book: bookName,
                            chapter: chapter,
                            score: score,
                            total_questions: questions.length,
                            user_answers: userAnswers,
                            completed_at: new Date().toISOString()
                        };
                        
                        console.log('Saving chapter result:', chapterResultData);
                        
                        const { data, error } = await supabase
                            .from('quiz_chapter_results')
                            .upsert(chapterResultData, { onConflict: 'user_id,quiz_date,book,chapter' });
                        
                        if (error) {
                            console.error('Supabase error details:', error);
                            throw error;
                        }
                        
                        console.log('Chapter result saved successfully:', data);
                    } catch (supabaseError) {
                        console.error('Error saving to Supabase:', supabaseError.message);
                        console.error('Error status:', supabaseError.status);
                        console.error('Full error:', supabaseError);
                        // Continue anyway - data is stored locally
                    }
                }
                
                // Store summary data in local state for displaying review
                state.quizSummaryData = {
                    chapter: chapter,
                    book: state.selectedQuizBook,
                    questions: questions,
                    userAnswers: userAnswers,
                    score: score,
                    totalQuestions: questions.length
                };

                // Reset to show leaderboard with updated scores
                state.quizStarted = false;
                state.selectedQuizChapter = null;
                state.selectedQuizBook = null;
                state.selectedTestament = null;

                // Reload all users' quiz progress to refresh leaderboard
                await loadQuizChaptersFromSupabase();

                render();
            } catch (error) {
                console.error('Error submitting quiz:', error);
                alert('Error submitting quiz: ' + error.message);
            }
        }

                container.addEventListener('scroll', () => {
                    isScrolling = true;
                    clearTimeout(button._scrollTimeout);
                    button._scrollTimeout = setTimeout(() => {
                        isScrolling = false;
                    }, 200); // 200ms grace period after scroll ends
                }, { passive: true });

                // Prevent click during scroll
                const originalClickHandler = button.onclick;
                button.addEventListener('click', (e) => {
                    if (isScrolling) {
                        e.preventDefault();
                        e.stopPropagation();
                        return false;
                    }
                });
            });
        }

        // Returns date string in YYYY-MM-DD format using IST (Asia/Kolkata) timezone
        function getISTDateString(date) {
            return (date || new Date()).toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' });
        }

        function getTodayReading(date) {
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const year = date.getFullYear();
            const isLeapYear = (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);

            // Find reading for the specific date
            const reading = yearlyReadingPlan.find(r => {
                if (r.month === month && r.day === day) {
                    // If it's Feb 29 entry, only return it for leap years
                    if (r.leapYearOnly) {
                        return isLeapYear;
                    }
                    return true;
                }
                return false;
            });

            return reading;
        }

        function getTamilName(englishBookName) {
            // Normalize the book name for comparison (uppercase for consistency)
            const normalized = englishBookName.toUpperCase();
            
            // Search in Old Testament
            const otBook = oldTestamentBooks.find(b => b.name === normalized);
            if (otBook) return otBook.tamil_name;
            
            // Search in New Testament
            const ntBook = newTestamentBooks.find(b => b.name === normalized);
            if (ntBook) return ntBook.tamil_name;
            
            return ''; // Return empty if not found
        }

        function getTestament(bookName) {
            // Determine if a book belongs to Old or New Testament
            const normalized = bookName.toUpperCase();
            
            // Check if it's in Old Testament
            const otBook = oldTestamentBooks.find(b => b.name === normalized);
            if (otBook) return 'Old Testament';
            
            // Check if it's in New Testament
            const ntBook = newTestamentBooks.find(b => b.name === normalized);
            if (ntBook) return 'New Testament';
            
            // Default fallback
            return 'Unknown';
        }

        function expandChapterRanges(portions) {
            // Expand chapter ranges into individual chapters
            // e.g., "Ezekiel 30-32" becomes "Ezekiel 30", "Ezekiel 31", "Ezekiel 32"
            // But keep verse ranges as-is, e.g., "119:1-88" stays as "119:1-88"
            const expanded = [];
            
            portions.forEach(portion => {
                const chapterPart = portion.chapters.trim();
                
                // Check if it contains verse range (e.g., "119:1-88")
                if (chapterPart.includes(':')) {
                    // Has verse range like "119:1-88" - keep as is
                    expanded.push(portion);
                } else if (chapterPart.includes('-')) {
                    // Simple chapter range like "30-32" (no verse range)
                    const parts = chapterPart.split('-');
                    const start = parseInt(parts[0], 10);
                    const end = parseInt(parts[1], 10);
                    
                    for (let i = start; i <= end; i++) {
                        expanded.push({
                            book: portion.book,
                            chapters: i.toString()
                        });
                    }
                } else {
                    // No range, just add as is
                    expanded.push(portion);
                }
            });
            
            return expanded;
        }

        function formatChaptersWithSpaces(chapters) {
            // Add proper spacing around dashes and colons
            // "30-32" becomes "30 - 32"
            // "119:1-42" becomes "119 : 1 - 42"
            return chapters
                .replace(/\s*-\s*/g, ' - ')  // Add spaces around dashes
                .replace(/\s*:\s*/g, ' : '); // Add spaces around colons
        }

        function calculateProgress(testament) {
            if (!state.currentUser) return { read: 0, total: 0, percentage: 0 };

            const books = testament === 'old' ? oldTestamentBooks : newTestamentBooks;
            let total = 0;
            let read = 0;

            books.forEach(book => {
                total += book.chapters;
                for (let i = 1; i <= book.chapters; i++) {
                    const key = `${book.name}-${i}`;
                    if (state.currentUser.progress[key] === 'read') read++;
                }
            });

            return { 
                read, 
                total, 
                percentage: Math.round((read / total) * 100)
            };
        }

        // Get chapter status: 'completed', 'today', 'overdue', 'future'
        function getChapterStatus(bookName, chapter, checkDate = null) {
            if (!state.currentUser) return 'future';

            // Check if chapter is completed (highest priority)
            const key = `${bookName}-${chapter}`;
            if (state.currentUser.progress[key] === 'read') return 'completed';

            // Use today's date for determining overdue status (not the selected date)
            const today = new Date();
            const todayMonth = today.getMonth() + 1;
            const todayDay = today.getDate();
            const todayYear = today.getFullYear();
            const isLeapYear = (todayYear % 4 === 0 && todayYear % 100 !== 0) || (todayYear % 400 === 0);

            // Check all reading plan entries up to TODAY
            for (const entry of yearlyReadingPlan) {
                // Skip leap year entries if not a leap year
                if (entry.leapYearOnly && !isLeapYear) continue;
                
                // Skip future dates (dates beyond today)
                if (entry.month > todayMonth || (entry.month === todayMonth && entry.day > todayDay)) {
                    break;
                }

                // Check if this chapter is in this day's portions
                for (const portion of entry.portions) {
                    if (normalizeBookName(portion.book) === normalizeBookName(bookName)) {
                        const chapters = parseChapterRange(portion.chapters);
                        if (chapters.includes(chapter)) {
                            // Check if it's today's reading
                            if (entry.month === todayMonth && entry.day === todayDay) {
                                return 'today';
                            }
                            // It's overdue (past date and not completed - we already checked completion above)
                            return 'overdue';
                        }
                    }
                }
            }

            return 'future';
        }

        // Storage Functions
        async function loadData() {
            // Only show loader if not initializing (during init, parent will show it)
            if (!state.isInitializing) {
                showLoading('Loading...');
            }
            
            // Load theme from localStorage
            const savedTheme = localStorage.getItem('bibleTrackerTheme');
            if (savedTheme) {
                state.darkMode = savedTheme === 'dark';
            }

            // Load users from Supabase
            try {
                const users = await BibleReadingDB.getAllUsers();
                if (users && users.length > 0) {
                    // Check if we need to recreate the users array
                    const existingUserIds = new Set(state.users.map(u => u.id));
                    const newUserIds = new Set(users.map(u => u.id));
                    const usersChanged = state.users.length !== users.length || 
                        !users.every(u => existingUserIds.has(u.id));

                    if (usersChanged || state.users.length === 0) {
                        // Clear the loaded data cache since we're recreating users
                        state.loadedUserData.clear();
                        
                        state.users = users.map(u => ({
                            id: u.id,
                            name: u.name,
                            progress: {},
                            completedDates: {},
                            joinedDate: u.joined_date
                        }));
                    }

                    // Load current user from localStorage
                    const savedCurrentUserId = localStorage.getItem('bibleTrackerCurrentUserId');
                    if (savedCurrentUserId) {
                        state.currentUser = state.users.find(u => u.id === savedCurrentUserId);
                        
                        // Only load progress for current user initially
                        if (state.currentUser) {
                            await loadUserProgress(state.currentUser);
                        }
                    }
                }
            } catch (error) {
                console.error('Error loading data:', error);
                // Fallback to localStorage
                const savedUsers = localStorage.getItem('bibleTrackerUsers');
                const savedCurrentUser = localStorage.getItem('bibleTrackerCurrentUser');
                if (savedUsers) {
                    state.users = JSON.parse(savedUsers);
                }
                if (savedCurrentUser) {
                    state.currentUser = JSON.parse(savedCurrentUser);
                }
            } finally {
                // Only hide loader if not initializing (let parent handle it)
                if (!state.isInitializing) {
                    hideLoading();
                }
            }
        }

                                progress.forEach(p => {

        // Load progress for a specific user
        async function loadUserProgress(user) {
            try {
                // Check and reset yearly progress if needed (only once per year per user)
                await BibleReadingDB.checkAndResetYearlyProgress(user.id);
                
                // Load progress and dates in parallel
                const [progress, dates] = await Promise.all([
                    BibleReadingDB.getUserProgress(user.id),
                    BibleReadingDB.getCompletedDates(user.id)
                ]);

                // Initialize objects if they don't exist
                if (!user.progress) {
                    user.progress = {};
                }
                if (!user.completedDates) {
                    user.completedDates = {};
                }

                // Process progress - merge with existing to preserve any local updates
                progress.forEach(p => {
                    // Normalize book name to match local state format
                    const normalizedBook = normalizeBookName(p.book_name) || p.book_name;
                    
                    if (!normalizeBookName(p.book_name)) {
                        console.warn('Could not normalize book from DB:', p.book_name);
                    }
                    
                    const key = `${normalizedBook}-${p.chapter_number}`;
                    user.progress[key] = p.status;
                });

                // Process completed dates - merge with existing to preserve any recent updates
                dates.forEach(dateStr => {
                    const [year, month, day] = dateStr.split('-').map(Number);
                    const dateKey = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    user.completedDates[dateKey] = true;
                });
                
                // Mark as loaded after successful load
                state.loadedUserData.add(user.id);
            } catch (error) {
                console.error('Error loading user progress:', error);
                // Ensure the objects exist even if loading fails
                if (!user.progress) user.progress = {};
                if (!user.completedDates) user.completedDates = {};
            }
        }


        // Initialize carousel swipe gestures
        function initCarouselSwipe() {
            const carouselContainer = document.querySelector('.carousel-container');
            if (!carouselContainer) return;

            let touchStartX = 0;
            let touchEndX = 0;

            carouselContainer.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });

            carouselContainer.addEventListener('touchend', (e) => {
                if (e.changedTouches && e.changedTouches.length > 0) {
                    touchEndX = e.changedTouches[0].screenX;
                } else if (e.touches && e.touches.length > 0) {
                    touchEndX = e.touches[0].screenX;
                }
                handleSwipe();
            }, { passive: true });

            function handleSwipe() {
                const swipeThreshold = 50; // minimum distance in pixels
                const diff = touchStartX - touchEndX;

                // Only handle carousel swipe if distance is large enough
                if (Math.abs(diff) < swipeThreshold) return;

                if (diff > 0) {
                    // Swiped left - go to next card (wrap to first if at last)
                    state.homeTabCardIndex = (state.homeTabCardIndex + 1) % 4;
                    render();
                } else {
                    // Swiped right - go to previous card (wrap to last if at first)
                    state.homeTabCardIndex = (state.homeTabCardIndex - 1 + 4) % 4;
                    render();
                }
            }

            // Also add keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (state.dashboardTab === 'home' && state.showDashboard) {
                    if (e.key === 'ArrowRight') {
                        state.homeTabCardIndex = (state.homeTabCardIndex + 1) % 4;
                        render();
                    } else if (e.key === 'ArrowLeft') {
                        state.homeTabCardIndex = (state.homeTabCardIndex - 1 + 4) % 4;
                        render();
                    }
                }
            });
        }

        async function loadYearlyMonthlyVerses() {
            try {
                const now = Date.now();
                const currentYear = new Date().getFullYear();
                const currentMonth = new Date().getMonth() + 1;
                const currentUserId = state.currentUser?.id;
                
                // Cache for 1 hour (3600000 ms), but always reload if user changed
                const isCacheValid = cachedVerses.lastFetch && 
                    (now - cachedVerses.lastFetch < 3600000) && 
                    cachedVerses.yearly && 
                    cachedVerses.monthly &&
                    cachedVerses.userPromise &&
                    cachedVerses.userCommand &&
                    cachedVerses.lastUserId === currentUserId;
                
                if (isCacheValid) {
                    console.log('Using cached verses for user', currentUserId);
                    return cachedVerses;
                }
                
                console.log('Fetching verses from Supabase for', currentYear, 'month', currentMonth, 'user', currentUserId);
                
                // Fetch both yearly/monthly verses and user-specific promise/command verses in parallel
                const fetchPromises = [
                    BibleReadingDB.getYearlyVerse(currentYear, 'tamil').catch(err => {
                        console.warn('Error loading yearly verse:', err);
                        return null;
                    }),
                    BibleReadingDB.getMonthlyVerse(currentYear, currentMonth, 'tamil').catch(err => {
                        console.warn('Error loading monthly verse:', err);
                        return null;
                    })
                ];

                // Add user-specific verses if user is logged in
                if (currentUserId) {
                    fetchPromises.push(
                        BibleReadingDB.getUserPromiseVerse(currentUserId).catch(err => {
                            console.warn('Error loading user promise verse for user', currentUserId, ':', err);
                            return null;
                        }),
                        BibleReadingDB.getUserCommandVerse(currentUserId).catch(err => {
                            console.warn('Error loading user command verse for user', currentUserId, ':', err);
                            return null;
                        })
                    );
                } else {
                    fetchPromises.push(Promise.resolve(null), Promise.resolve(null));
                }

                const [yearlyVerse, monthlyVerse, userPromiseVerse, userCommandVerse] = await Promise.all(fetchPromises);
                
                console.log('Supabase verses fetched for user', currentUserId, ':', { 
                    yearly: yearlyVerse ? { reference: yearlyVerse.reference, hasText: !!yearlyVerse.verse_text } : null,
                    monthly: monthlyVerse ? { reference: monthlyVerse.reference, hasText: !!monthlyVerse.verse_text } : null,
                    userPromise: userPromiseVerse ? { reference: userPromiseVerse.reference, hasText: !!userPromiseVerse.verse_text } : null,
                    userCommand: userCommandVerse ? { reference: userCommandVerse.reference, hasText: !!userCommandVerse.verse_text } : null
                });
                
                cachedVerses = {
                    yearly: yearlyVerse,
                    monthly: monthlyVerse,
                    userPromise: userPromiseVerse,
                    userCommand: userCommandVerse,
                    lastFetch: now,
                    lastUserId: currentUserId
                };
                
                console.log('Verses loaded and cached for user', currentUserId, ':', { 
                    yearly: !!yearlyVerse, 
                    monthly: !!monthlyVerse,
                    userPromise: !!userPromiseVerse,
                    userCommand: !!userCommandVerse
                });
                
                // Trigger re-render if dashboard is visible
                if (state.showDashboard && state.dashboardTab === 'home') {
                    render();
                }
                
                return cachedVerses;
            } catch (error) {
                console.error('Error loading yearly/monthly verses:', error);
                return cachedVerses;
            }
        }

        // Setup real-time subscriptions for live updates
        function setupRealtimeSubscriptions() {
            if (!window.BibleReadingDB) return;
            
            // Subscribe to completed dates changes
            BibleReadingDB.subscribeToCompletedDates((payload) => {
                console.log('Completed dates changed:', payload);
                
                // Update affected user's completedDates in state
                const user = state.users.find(u => u.id === payload.new?.user_id || payload.old?.user_id);
                if (user && payload.new) {
                    const date = payload.new.completed_date;
                    if (!user.completedDates) user.completedDates = {};
                    user.completedDates[date] = true;
                    
                    // Re-render if on dashboard
                    if (state.showDashboard) {
                        renderDashboardOnly();
                    }
                }
            });
            
            // Subscribe to reading progress changes
            BibleReadingDB.subscribeToReadingProgress((payload) => {
                console.log('Reading progress changed:', payload);
                
                // Update affected user's progress in state
                const user = state.users.find(u => u.id === payload.new?.user_id || payload.old?.user_id);
                if (user && payload.new) {
                    const key = `${payload.new.book_name}-${payload.new.chapter_number}`;
                    if (!user.progress) user.progress = {};
                    user.progress[key] = payload.new.status;
                    
                    // Re-render if viewing this user or on dashboard
                    if ((state.currentUser && state.currentUser.id === user.id) || state.showDashboard) {
                        if (state.showDashboard) {
                            renderDashboardOnly();
                        } else {
                            render();
                        }
                    }
                }
            });
            
            // Subscribe to daily portions changes
            BibleReadingDB.subscribeToDailyPortions((payload) => {
                console.log('Daily portions changed:', payload);
                
                // This would trigger reload of portions for affected user
                const user = state.users.find(u => u.id === payload.new?.user_id || payload.old?.user_id);
                if (user) {
                    // Reload completed portions if current user
                    if (state.currentUser && state.currentUser.id === user.id) {
                        loadCompletedPortionsForDate();
                        render();
                    }
                    
                    // Update dashboard if visible
                    if (state.showDashboard) {
                        renderDashboardOnly();
                    }
                }
            });
        }

        async function loadAllUsersProgressInBackground() {
            // If already loading, return existing promise
            if (loadingAllUsersPromise) {
                return loadingAllUsersPromise;
            }
            
            // Skip if all users are already loaded
            const usersToLoad = state.users.filter(u => !state.loadedUserData.has(u.id));
            if (usersToLoad.length === 0) {
                return;
            }

            loadingAllUsersPromise = (async () => {
                try {
                    // Load in batches of 3 to avoid overwhelming the database
                    const batchSize = 3;
                    for (let i = 0; i < usersToLoad.length; i += batchSize) {
                        const batch = usersToLoad.slice(i, i + batchSize);
                        await Promise.all(batch.map(user => loadUserProgress(user)));
                        
                        // Re-render to show updated stats if on dashboard
                        if (state.showDashboard && !state.showAdminView) {
                            render();
                        }
                    }
                } catch (error) {
                    console.error('Error loading users progress in background:', error);
                } finally {
                    loadingAllUsersPromise = null;
                }
            })();

            return loadingAllUsersPromise;
        }

                        const userId = record.user_id;
                        const bookName = record.book;
                        const chapterNum = record.chapter;
                        
                        // Initialize nested structure if needed

                        }

                        }
                        if (!state.chapterScores[dateKey][userId][bookName]) {
                            state.chapterScores[dateKey][userId][bookName] = {};
                        }
                        
                        // Mark chapter as completed and store score
                        state.completedQuizChapters[dateKey][userId][bookName][chapterNum] = true;
                        state.chapterScores[dateKey][userId][bookName][chapterNum] = record.score;
                    });

                    console.log('Quiz chapters loaded from new table');
                    
                    // Build all-time leaderboard from the new data
                    const userScoreTotals = {};
                    
                    data.forEach(record => {
                        if (!userScoreTotals[record.user_id]) {
                            userScoreTotals[record.user_id] = {
                                totalScore: 0,
                                totalQuestions: 0,
                                quizzesCompleted: 0
                            };
                        }
                        
                        userScoreTotals[record.user_id].totalScore += record.score || 0;
                        userScoreTotals[record.user_id].totalQuestions += record.total_questions || 0;
                        userScoreTotals[record.user_id].quizzesCompleted += 1;
                    });

                    // Build all-time leaderboard
                    state.quizLeaderboard = state.users
                        .map(user => {
                            const totals = userScoreTotals[user.id];
                            return {
                                name: user.name,
                                score: totals?.totalScore || 0,
                                total_questions: totals?.totalQuestions || 0,
                                quizzesCompleted: totals?.quizzesCompleted || 0
                            };
                        })
                        .filter(entry => entry.score > 0)
                        .sort((a, b) => b.score - a.score)
                        .map((entry, idx) => ({ ...entry, rank: idx + 1 }));

                    state.quizDataLoaded = true;

                    render();

        async function markUserUpToDate(userId) {
            const user = state.users.find(u => u.id === userId);
            if (!user) return;

            showCustomModal({
                type: 'primary',
                title: 'Mark Up to Date',
                message: `Mark all readings up to today (${new Date().toLocaleDateString()}) as completed for ${user.name}?`,
                confirmText: 'Update',
                cancelText: 'Cancel',
                onConfirm: async () => {
                    showLoading('Marking readings as complete...');
                    
                    try {
                        const today = new Date();
                const todayMonth = today.getMonth() + 1;
                const todayDay = today.getDate();

                // Collect all chapters and dates to mark
                const chaptersToMark = [];
                const datesToMark = [];

                const year = today.getFullYear();
                const isLeapYear = (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);

                // Build batch data
                yearlyReadingPlan.forEach(entry => {
                    // Skip leap year entries if not a leap year
                    if (entry.leapYearOnly && !isLeapYear) return;
                    
                    // Only process entries up to and including today
                    const isBeforeToday = entry.month < todayMonth || (entry.month === todayMonth && entry.day <= todayDay);
                    if (!isBeforeToday) {
                        return;
                    }

                    const dateStr = `${year}-${String(entry.month).padStart(2, '0')}-${String(entry.day).padStart(2, '0')}`;
                    
                    datesToMark.push(dateStr);

                    // Collect chapters
                    entry.portions.forEach(portion => {
                        const chapters = parseChapterRange(portion.chapters);
                        
                        // Handle combined book entries like "2 John & 3 John"
                        const bookNames = portion.book.includes('&') 
                            ? portion.book.split('&').map(b => b.trim())
                            : [portion.book];
                        
                        bookNames.forEach(rawBookName => {
                            const bookName = normalizeBookName(rawBookName);
                            if (bookName) {
                                chapters.forEach(ch => {
                                    chaptersToMark.push({
                                        book: bookName,
                                        chapter: ch
                                    });
                                });
                            } else {
                                console.warn('Could not normalize book name:', rawBookName);
                            }
                        });
                    });
                });
                
                // Deduplicate chapters before inserting
                const uniqueChapters = [];
                const seen = new Set();
                chaptersToMark.forEach(ch => {
                    const key = `${ch.book}-${ch.chapter}`;
                    if (!seen.has(key)) {
                        seen.add(key);
                        uniqueChapters.push(ch);
                    }
                });

                // Calculate OT/NT breakdown for verification
                const otChapters = uniqueChapters.filter(ch => {
                    return oldTestamentBooks.some(b => b.name === ch.book);
                });
                const ntChapters = uniqueChapters.filter(ch => {
                    return newTestamentBooks.some(b => b.name === ch.book);
                });

                console.log('Preparing to mark:', {
                    totalChapters: chaptersToMark.length,
                    uniqueChapters: uniqueChapters.length,
                    otChapters: otChapters.length,
                    ntChapters: ntChapters.length,
                    duplicatesRemoved: chaptersToMark.length - uniqueChapters.length,
                    totalDates: datesToMark.length,
                    todayDate: `${todayMonth}/${todayDay}/${year}`,
                    isLeapYear: isLeapYear,
                    sampleOTChapters: otChapters.slice(0, 5),
                    sampleNTChapters: ntChapters.slice(0, 5),
                    sampleDates: datesToMark.slice(0, 5)
                });

                // Batch insert chapters (do in chunks to avoid too large requests)
                const chunkSize = 100;
                let chaptersInserted = 0;
                for (let i = 0; i < uniqueChapters.length; i += chunkSize) {
                    const chunk = uniqueChapters.slice(i, i + chunkSize);
                    try {

                        saveData();
